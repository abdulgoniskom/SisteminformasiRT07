<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta & Denah RT 07</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:#eef2f7; padding: 15px; }
        
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: #27ae60; font-size: 20px; }
        
        .card { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; overflow: hidden; }

        /* Wadah Google Maps agar responsif */
        .map-responsive {
            overflow: hidden;
            padding-bottom: 100%; /* Membuat kotak peta persegi di HP */
            position: relative;
            height: 0;
            border-radius: 10px;
        }
        .map-responsive iframe {
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            position: absolute;
            border: 0;
        }

        .info-peta { padding: 10px; font-size: 13px; color: #555; line-height: 1.6; }
        .btn-back { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📍 Peta Wilayah RT 07</h2>
        <p style="font-size: 12px; color: #7f8c8d;">Bumi Indah City - RT 07 RW 09</p>
    </div>

    <div class="card">
        <div class="map-responsive">
            <iframe 
                src="https://www.google.com/maps/d/edit?mid=1dBEUel8W-nid4D3Z4icora5S3TJndKI&usp=sharing" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
        <div class="info-peta">
            <b>Petunjuk:</b><br>
            Gunakan dua jari untuk menggeser peta di HP. Bapak/Ibu bisa menekan tombol <b>"View larger map"</b> untuk navigasi GPS langsung ke lokasi.
        </div>
    </div>

    <a href="fitur.html" class="btn-back">← Kembali ke Fitur Warga</a>
</div>

</body>
</html>
