<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender RT 07</title>
    <style>
        /* CSS DISAMAKAN DENGAN INDEX.HTML */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f1f4f9;
            display: flex;
        }

        /* SIDEBAR (Sama persis dengan index.html) */
        .sidebar {
            width: 220px;
            background: #2c3e50;
            height: 100vh;
            color: white;
            position: fixed;
        }

        .sidebar h2 {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
        }

        .sidebar a:hover, .sidebar a.active {
            background: #34495e;
        }

        /* MAIN CONTENT (Sama persis dengan index.html) */
        .main {
            margin-left: 220px;
            width: 100%;
        }

        header {
            background: white;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            padding: 30px;
        }

        /* KALENDER STYLE */
        .calendar-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-nav {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        #month-year {
            font-size: 20px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f7f9fc;
            padding: 15px;
            border: 1px solid #ddd;
        }

        td {
            border: 1px solid #ddd;
            height: 100px;
            vertical-align: top;
            padding: 10px;
            width: 14.28%;
        }

        .date-num {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .today {
            background: #e3f2fd;
            border: 2px solid #2f80ed !important;
        }

        /* EVENT STYLE */
        .event-item {
            font-size: 11px;
            padding: 4px;
            border-radius: 3px;
            margin-top: 3px;
            color: white;
            line-height: 1.2;
        }

        .cat-rapat { background: #9b59b6; }
        .cat-sosial { background: #27ae60; }
        .cat-umum { background: #2f80ed; }
        .loc-text { font-size: 9px; display: block; opacity: 0.8; }

        /* ADMIN BUTTON */
        #adminPanel {
            display: none; /* Default sembunyi, hanya muncul jika ?role=admin */
            margin-bottom: 20px;
        }

        .btn-input {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html" class="active">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main">
    <header>
        <h2>Kalender Kegiatan RT 07</h2>
        <div id="userStatus">Mode: Warga</div>
    </header>

    <div class="container">
        <div id="adminPanel">
            <button class="btn-input" onclick="inputKegiatan()">+ Tambah Kegiatan Baru</button>
        </div>

        <div class="calendar-box">
            <div class="calendar-nav">
                <button class="btn-nav" id="prevBulan">← Prev</button>
                <div id="month-year">Maret 2026</div>
                <button class="btn-nav" id="nextBulan">Next →</button>
            </div>

            <table id="calendarTable">
                <thead>
                    <tr>
                        <th>Min</th><th>Sen</th><th>Sel</th><th>Rab</th><th>Kam</th><th>Jum</th><th>Sab</th>
                    </tr>
                </thead>
                <tbody id="calendarBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycby4Q6kprAvG3llcnA3MPjnKjQJTLYQt8mFlbj7EaKK3r4qnWZJYXLq501RR8kJM2vk/exec';
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role'); // Ambil ?role=...

    let date = new Date();
    let currYear = date.getFullYear();
    let currMonth = date.getMonth();
    let eventsData = {};

    // CEK ROLE ADMIN
    if (role === 'admin') {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('userStatus').innerText = "Mode: Administrator";
    }

    async function loadData() {
        try {
            const res = await fetch(scriptURL);
            eventsData = await res.json();
            renderKalender(currYear, currMonth);
        } catch (e) { console.log("Gagal load"); }
    }

    function renderKalender(year, month) {
        const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        document.getElementById("month-year").innerText = months[month] + " " + year;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const tbody = document.getElementById("calendarBody");
        tbody.innerHTML = "";

        let row = document.createElement("tr");
        for (let i = 0; i < firstDay; i++) {
            row.appendChild(document.createElement("td"));
        }

        for (let d = 1; d <= lastDate; d++) {
            if ((firstDay + d - 1) % 7 === 0 && d !== 1) {
                tbody.appendChild(row);
                row = document.createElement("tr");
            }

            let cell = document.createElement("td");
            let tglKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            if (tglKey === new Date().toISOString().split('T')[0]) cell.classList.add('today');

            let html = `<span class="date-num">${d}</span>`;
            
            if (eventsData[tglKey]) {
                let ev = eventsData[tglKey];
                let cat = ev.kategori.toLowerCase();
                let catClass = cat.includes('rapat') ? 'cat-rapat' : (cat.includes('sosial') ? 'cat-sosial' : 'cat-umum');
                
                html += `<div class="event-item ${catClass}">
                            <b>${ev.kegiatan}</b>
                            <span class="loc-text">📍 ${ev.lokasi}</span>
                         </div>`;
            }

            cell.innerHTML = html;
            row.appendChild(cell);
        }
        tbody.appendChild(row);
    }

    // FUNGSI INPUT (Hanya jalan jika Admin)
    async function inputKegiatan() {
        const tgl = prompt("Tanggal (YYYY-MM-DD):", `${currYear}-${String(currMonth+1).padStart(2,'0')}-01`);
        const keg = prompt("Nama Kegiatan:");
        const lok = prompt("Lokasi:");
        const kat = prompt("Kategori (Rapat/Sosial/Umum):");

        if (tgl && keg && lok && kat) {
            alert("Sedang menyimpan...");
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ tanggal: tgl, kegiatan: keg, lokasi: lok, kategori: kat })
            });
            window.location.reload();
        }
    }

    document.getElementById("prevBulan").onclick = () => { currMonth--; if(currMonth<0){currMonth=11; currYear--;} renderKalender(currYear, currMonth); };
    document.getElementById("nextBulan").onclick = () => { currMonth++; if(currMonth>11){currMonth=0; currYear++;} renderKalender(currYear, currMonth); };

    loadData();
</script>

</body>
</html>
