<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalender Kegiatan RT</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

/* SIDEBAR */

.sidebar{
width:200px;
background:#2c3e50;
height:100vh;
position:fixed;
left:0;
top:0;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#34495e;
}

/* CONTENT */

.content{
margin-left:200px;
padding:20px;
}

#calendar{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

.close{
float:right;
cursor:pointer;
font-size:18px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>RT 01</h2>

<a href="index.html">Dashboard</a>
<a href="kas.html">Kas RT</a>
<a href="warga.html">Data Warga</a>
<a href="pengumuman.html">Pengumuman</a>
<a href="arsip.html">Arsip</a>
<a href="kalender.html">Kalender</a>
<a href="struktur.html">Struktur RT</a>

</div>

<!-- CONTENT -->

<div class="content">

<h1>Kalender Kegiatan RT</h1>

<div id="calendar"></div>

</div>

<!-- POPUP DETAIL -->

<div class="popup" id="popup">

<div class="popup-content">

<span class="close" onclick="tutupPopup()">✖</span>

<h3 id="judul"></h3>

<p><b>Tanggal :</b> <span id="tgl"></span></p>

<p><b>Lokasi :</b> <span id="lokasi"></span></p>

<p><b>Kategori :</b> <span id="kategori"></span></p>

</div>

</div>

<script>

const url="https://script.google.com/macros/s/AKfycbzXWDQp3Sn2BMrhNrnzJ0niJnZQnNb5gUo1W_Ee-O2sHwGV2WuS7slvfY7wYTN8DPU/exec"

fetch(url)
.then(res=>res.json())
.then(data=>{

let events=data.map(e=>{

let warna="#3498db"

if(e.Kategori=="Rapat") warna="#e74c3c"
if(e.Kategori=="Sosial") warna="#2ecc71"
if(e.Kategori=="Keamanan") warna="#f39c12"
if(e.Kategori=="Kesehatan") warna="#9b59b6"

return{
title:e.Kegiatan,
start:e.Tanggal,
extendedProps:{
lokasi:e.Lokasi,
kategori:e.Kategori
},
color:warna
}

})

tampilkanKalender(events)

})

function tampilkanKalender(events){

let calendarEl=document.getElementById('calendar')

let calendar=new FullCalendar.Calendar(calendarEl,{

initialView:'dayGridMonth',

headerToolbar:{
left:'prev,next today',
center:'title',
right:'dayGridMonth,timeGridWeek,timeGridDay'
},

events:events,

eventClick:function(info){

document.getElementById("judul").innerText=info.event.title
document.getElementById("tgl").innerText=info.event.start.toLocaleDateString()
document.getElementById("lokasi").innerText=info.event.extendedProps.lokasi
document.getElementById("kategori").innerText=info.event.extendedProps.kategori

document.getElementById("popup").style.display="flex"

}

})

calendar.render()

}

function tutupPopup(){

document.getElementById("popup").style.display="none"

}

</script>

</body>
</html>
