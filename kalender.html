<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Kegiatan RT 07 - RT 07 RW 09</title>
    <style>
        /* CSS SINKRON DENGAN ARSIP & WARGA */
        * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
        body { background:#eef2f7; display:flex; overflow-x: hidden; }

        .sidebar { 
            width:220px; background:#2c3e50; height:100vh; color:white; 
            position:fixed; transition: 0.3s; z-index: 1000; left: 0;
        }
        .sidebar.closed { left: -220px; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); font-size:18px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover { background:#34495e; border-left: 4px solid #1abc9c; }
        .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; font-weight: bold; }
        
        .main { margin-left:220px; width:100%; transition: 0.3s; min-height: 100vh; }
        .main.expanded { margin-left: 0; }

        header { 
            background:#2f80ed; color:white; padding:15px; 
            display:flex; justify-content:space-between; align-items: center; 
            position: sticky; top: 0; z-index: 900;
        }
        .menu-btn { font-size: 24px; cursor: pointer; color: white; margin-right: 15px; }

        .container { padding:20px; max-width:1100px; margin:auto; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); }
        
        /* CALENDAR TABLE */
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #month-year { font-weight: bold; font-size: 20px; color: #2c3e50; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f7f9fc; padding: 10px; border: 1px solid #ddd; color: #2f80ed; font-size: 13px; }
        td { border: 1px solid #ddd; height: 110px; vertical-align: top; padding: 5px; background: #fff; position: relative; }
        
        .date-num { font-weight: bold; font-size: 14px; color: #555; }
        .today { background: #e3f2fd !important; border: 2px solid #2f80ed !important; }
        .event-item { 
            font-size: 10px; padding: 3px 5px; border-radius: 3px; 
            margin-top: 5px; color: white; background: #eb5757; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        /* LIST DETAIL BAWAH */
        .detail-box { margin-top: 30px; border-top: 2px solid #ddd; padding-top: 20px; }
        .detail-item { 
            padding: 12px; background: #f9f9f9; border-left: 5px solid #2f80ed; 
            margin-bottom: 10px; border-radius: 5px;
        }

        .btn { padding:8px 15px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
        .btn-nav { background:#2f80ed; color:white; }
        .btn-login { background: rgba(255,255,255,0.2); border: 1px solid white; color:white; font-size: 12px; }
        .btn-add { background:#27ae60; color:white; width: 100%; margin-bottom: 15px; }

        @media (max-width: 768px) {
            .sidebar { left: -220px; }
            .sidebar.open { left: 0; }
            .main { margin-left: 0; }
            td { height: 75px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html" class="active">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main" id="mainContent">
    <header>
        <div style="display: flex; align-items: center;">
            <div class="menu-btn" onclick="toggleSidebar()">☰</div>
            <h2 style="font-size: 16px;">Kalender Kegiatan RT 07</h2>
        </div>
        <button class="btn btn-login" id="authBtn" onclick="handleAuth()">Login Admin</button>
    </header>

    <div class="container">
        <div id="adminPanel" style="display:none;">
            <button class="btn btn-add" onclick="inputKegiatan()">+ Tambah Kegiatan Baru</button>
        </div>

        <div class="card">
            <div class="calendar-nav">
                <button class="btn btn-nav" onclick="moveMonth(-1)">❮</button>
                <div id="month-year"></div>
                <button class="btn btn-nav" onclick="moveMonth(1)">❯</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Min</th><th>Sen</th><th>Sel</th><th>Rab</th><th>Kam</th><th>Jum</th><th>Sab</th>
                        </tr>
                    </thead>
                    <tbody id="calendarBody"></tbody>
                </table>
            </div>

            <div class="detail-box">
                <h4 style="margin-bottom: 15px; color: #2c3e50;">📋 Daftar Kegiatan Bulan Ini</h4>
                <div id="list-detail">
                    <p style="color: #999; font-size: 13px;">Memuat data dari Google Sheets...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // URL SCRIPT BAPAK
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzQkEf8MLhO5Q0_S370X4RSkxcW95MT0-dCRCNdPpuU3p5-xGVjuoOwU4kqccrLroc/exec'; 
    
    let date = new Date();
    let eventsArray = []; 
    let isAdmin = (localStorage.getItem('rt07_admin_kalender') === 'true');

    function toggleSidebar() {
        const sidebar = document.getElementById("mySidebar");
        const main = document.getElementById("mainContent");
        if (window.innerWidth > 768) {
            sidebar.classList.toggle("closed");
            main.classList.toggle("expanded");
        } else {
            sidebar.classList.toggle("open");
        }
    }

    async function handleAuth() {
    if (isAdmin) {
        if (confirm("Apakah Anda yakin ingin Logout?")) {
            localStorage.removeItem('rt07_admin_kalender');
            location.reload();
        }
    } else {
        let user = prompt("Masukkan Username Admin:");
        if (!user) return;
        let pass = prompt("Masukkan Password Admin:");
        if (!pass) return;

        alert("Sedang memverifikasi...");
        try {
            const response = await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: "login", 
                    username: user, 
                    password: pass 
                })
            });
            const res = await response.json();

            if (res.result === "success") {
                localStorage.setItem('rt07_admin_kalender', 'true');
                alert("Login Berhasil! Selamat Datang Admin.");
                location.reload();
            } else {
                alert("Username atau Password Salah!");
            }
        } catch (e) {
            alert("Gagal koneksi ke server.");
        }
    }
}
    // Fungsi pembantu untuk memformat tanggal ISO/String GSheet ke YYYY-MM-DD lokal
    function formatToLocalISO(dateInput) {
        let d = new Date(dateInput);
        let month = '' + (d.getMonth() + 1);
        let day = '' + d.getDate();
        let year = d.getFullYear();

        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;

        return [year, month, day].join('-');
    }

    async function fetchEvents() {
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            eventsArray = Array.isArray(data) ? data : [];
            renderCalendar();
        } catch (e) { 
            console.error("Gagal Ambil Data:", e);
            renderCalendar();
        }
    }

    function renderCalendar() {
        const year = date.getFullYear();
        const month = date.getMonth();
        const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        document.getElementById("month-year").innerText = months[month] + " " + year;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const tbody = document.getElementById("calendarBody");
        tbody.innerHTML = "";

        let row = document.createElement("tr");
        for (let i = 0; i < firstDay; i++) row.appendChild(document.createElement("td"));

        for (let d = 1; d <= lastDate; d++) {
            if ((firstDay + d - 1) % 7 === 0 && d !== 1) {
                tbody.appendChild(row);
                row = document.createElement("tr");
            }
            
            let cell = document.createElement("td");
            let tglKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            if (d === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear()) {
                cell.classList.add('today');
            }

            let html = `<span class="date-num">${d}</span>`;
            
            // LOGIKA FILTER DIPERBAIKI: Menggunakan format lokal agar tidak selisih hari
            const kegiatanHariIni = eventsArray.filter(ev => {
                let tglEvent = formatToLocalISO(ev.tanggal);
                return tglEvent === tglKey;
            });

            kegiatanHariIni.forEach(ev => {
                html += `<div class="event-item" title="${ev.kegiatan}"><b>${ev.kegiatan}</b></div>`;
            });

            cell.innerHTML = html;
            row.appendChild(cell);
        }
        while (row.children.length < 7) row.appendChild(document.createElement("td"));
        tbody.appendChild(row);

        updateDetailList();
    }

    function updateDetailList() {
        const listContainer = document.getElementById("list-detail");
        listContainer.innerHTML = "";
        const curMonth = date.getMonth() + 1;
        const curYear = date.getFullYear();

        // Ambil kegiatan hanya untuk bulan yang sedang tampil
        const filterBulan = eventsArray.filter(ev => {
            let localDate = formatToLocalISO(ev.tanggal);
            let parts = localDate.split('-');
            return parseInt(parts[1]) === curMonth && parseInt(parts[0]) === curYear;
        });

        if (filterBulan.length > 0) {
            // Urutkan berdasarkan tanggal terkecil
            filterBulan.sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));

            filterBulan.forEach(item => {
                const div = document.createElement("div");
                div.className = "detail-item";
                
                // Format tanggal untuk tampilan user (misal: 12 Maret 2026)
                let displayDate = new Date(item.tanggal).toLocaleDateString('id-ID', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });

                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${item.kegiatan}</strong>
                        <span style="font-size: 11px; color: #2f80ed;">📅 ${displayDate}</span>
                    </div>
                    <div style="font-size: 12px; color: #666; margin-top: 5px;">
                        📍 ${item.lokasi || 'Lokasi tidak diatur'} | 🏷️ ${item.kategori || 'Umum'}
                    </div>
                `;
                listContainer.appendChild(div);
            });
        } else {
            listContainer.innerHTML = "<p style='color: #999; font-size: 13px;'>Tidak ada kegiatan di bulan ini.</p>";
        }
    }

    function moveMonth(v) {
        date.setMonth(date.getMonth() + v);
        renderCalendar();
    }

    async function inputKegiatan() {
        const tgl = prompt("Tanggal (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
        const keg = prompt("Nama Kegiatan:");
        const lok = prompt("Lokasi:");
        const kat = prompt("Kategori:");

        if (tgl && keg) {
            alert("Sedang menyimpan ke Google Sheets...");
            try {
                // Menggunakan fetch dengan mode no-cors jika perlu, 
                // tapi biasanya POST JSON ke Apps Script butuh konfigurasi doGet/doPost yang benar
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ tanggal: tgl, kegiatan: keg, lokasi: lok, kategori: kat })
                });
                alert("Data berhasil masuk GSheet!");
                location.reload();
            } catch (e) { alert("Gagal koneksi ke server."); }
        }
    }

    // JALANKAN AMBIL DATA
    fetchEvents();
</script>
</body>
</html>
