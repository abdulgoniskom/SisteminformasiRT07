<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Kegiatan RT 07</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { background:#f1f4f9; display:flex; overflow-x: hidden; }

        /* SIDEBAR */
        .sidebar { 
            width:220px; background:#2c3e50; height:100vh; color:white; 
            position:fixed; transition: 0.3s; z-index: 1000; 
        }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); font-size:18px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover, .active { background:#34495e; border-left: 4px solid #1abc9c; }
        
        /* MAIN CONTENT */
        .main { margin-left:220px; width:100%; transition: 0.3s; min-width: 0; }
        header { 
            background:white; padding:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); 
            display:flex; justify-content:space-between; align-items: center; 
        }

        .menu-btn { display: none; font-size: 24px; cursor: pointer; color: #2c3e50; }
        .btn-login { padding: 8px 15px; border: none; border-radius: 5px; background: #2f80ed; color: white; cursor: pointer; }

        .container { padding:15px; }
        .admin-panel { 
            background: #fff; padding: 15px; border-radius: 10px; 
            margin-bottom: 20px; display: none; border: 1px dashed #eb5757;
        }
        .btn-add { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; }

        /* KALENDER */
        .calendar-box { 
            background: white; padding: 15px; border-radius: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; 
        }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #month-year { font-weight: bold; font-size: 18px; }
        .btn-nav { background: #eee; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f7f9fc; padding: 10px; border: 1px solid #ddd; font-size: 13px; }
        td { border: 1px solid #ddd; height: 100px; vertical-align: top; padding: 5px; width: 14.28%; }
        
        .date-num { font-weight: bold; font-size: 14px; }
        .today { background: #e3f2fd; border: 2px solid #2f80ed !important; }
        .event-item { font-size: 11px; padding: 4px; border-radius: 3px; margin-top: 4px; color: white; background: #eb5757; line-height: 1.2; }
        
        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .sidebar { left: -220px; }
            .sidebar.open { left: 0; }
            .main { margin-left: 0; }
            .menu-btn { display: block; }
            td { height: 80px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html" class="active">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main">
    <header>
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <h2 style="font-size: 16px;">Kalender RT 07</h2>
        <button class="btn-login" id="authBtn" onclick="handleAuth()">Login Admin</button>
    </header>

    <div class="container">
        <div class="admin-panel" id="adminPanel">
            <h4 style="margin-bottom:10px">Panel Administrator</h4>
            <button class="btn-add" onclick="inputKegiatan()">+ Tambah Kegiatan Baru</button>
        </div>

        <div class="calendar-box">
            <div class="calendar-nav">
                <button class="btn-nav" onclick="moveMonth(-1)">←</button>
                <div id="month-year"></div>
                <button class="btn-nav" onclick="moveMonth(1)">→</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Min</th><th>Sen</th><th>Sel</th><th>Rab</th><th>Kam</th><th>Jum</th><th>Sab</th>
                    </tr>
                </thead>
                <tbody id="calendarBody"></tbody>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <div id="detail-kegiatan">
                <h4 style="margin-bottom: 10px; color: #2c3e50;">📋 Daftar Detail Kegiatan</h4>
                <div id="list-detail">
                    <p style="color: #999; font-size: 13px;">Pilih bulan untuk melihat daftar kegiatan.</p>
                </div>
            </div>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwiUg77Qg3ntKP5ZCPI8vPzD1Gb0wGoI5XI3HKVO2XREJfPEv99wBicC_yvlgx9kjU/exec'; 
    
    let date = new Date();
    let eventsData = {};
    let isAdmin = (localStorage.getItem('rt07_admin_kalender') === 'true');

    // --- FUNGSI UI & SIDEBAR ---
    function toggleSidebar() {
        document.getElementById("mySidebar").classList.toggle("open");
    }

    // Klik di luar sidebar untuk menutup di HP
    document.addEventListener('click', function(e) {
        const sidebar = document.getElementById('mySidebar');
        const btn = document.querySelector('.menu-btn');
        if (window.innerWidth <= 768 && !sidebar.contains(e.target) && e.target !== btn) {
            sidebar.classList.remove('open');
        }
    });

    function handleAuth() {
        if (isAdmin) {
            localStorage.removeItem('rt07_admin_kalender');
            location.reload();
        } else {
            let pass = prompt("Password Admin Kalender:");
            if (pass === "123") {
                localStorage.setItem('rt07_admin_kalender', 'true');
                location.reload();
            } else { alert("Password Salah!"); }
        }
    }

    if (isAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('authBtn').innerText = "Logout Admin";
        document.getElementById('authBtn').style.background = "#eb5757";
    }

    // --- FUNGSI KALENDER ---
    async function fetchEvents() {
        try {
            const response = await fetch(scriptURL);
            eventsData = await response.json();
            renderCalendar();
        } catch (e) { 
            console.error("Gagal mengambil data:", e);
            renderCalendar(); // Tetap render meski data kosong
        }
    }

    function renderCalendar() {
        // ... kode yang sudah ada (looping pembuatan tanggal) ...
        
        tbody.appendChild(row);

        // TAMBAHKAN LOGIKA INI DI AKHIR FUNGSI renderCalendar
        updateDetailList();
    }

    function updateDetailList() {
        const listContainer = document.getElementById("list-detail");
        listContainer.innerHTML = ""; // Reset isi

        const month = date.getMonth() + 1;
        const year = date.getFullYear();
        let adaData = false;

        // Cari data yang sesuai dengan bulan dan tahun yang sedang tampil
        for (let tgl dalam eventsData) {
            const [eYear, eMonth, eDay] = tgl.split('-');
            
            if (parseInt(eYear) === year && parseInt(eMonth) === month) {
                adaData = true;
                const item = eventsData[tgl];
                
                const div = document.createElement("div");
                div.style = "padding: 10px; background: #f9f9f9; border-left: 4px solid #eb5757; margin-bottom: 8px; border-radius: 4px;";
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${item.kegiatan}</strong>
                        <span style="font-size: 12px; color: #666;">📅 ${tgl}</span>
                    </div>
                    <div style="font-size: 13px; color: #555; margin-top: 4px;">
                        📍 Lokasi: ${item.lokasi} | 🏷️ Kategori: ${item.kategori || '-'}
                    </div>
                `;
                listContainer.appendChild(div);
            }
        }

        if (!adaData) {
            listContainer.innerHTML = "<p style='color: #999; font-size: 13px;'>Tidak ada kegiatan di bulan ini.</p>";
        }
    }
    function moveMonth(v) {
        date.setMonth(date.getMonth() + v);
        renderCalendar();
    }

    async function inputKegiatan() {
        const tgl = prompt("Tanggal (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
        const keg = prompt("Nama Kegiatan:");
        const lok = prompt("Lokasi:");
        const kat = prompt("Kategori (Rapat/Umum/Bakti):");

        if (tgl && keg) {
            alert("Sedang menyimpan... Mohon tunggu.");
            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ tanggal: tgl, kegiatan: keg, lokasi: lok, kategori: kat })
                });
                location.reload();
            } catch (e) {
                alert("Gagal menyimpan. Cek koneksi atau izin Google Script Bapak.");
            }
        }
    }

    // Jalankan saat pertama kali buka
    fetchEvents();
</script>
</body>
</html>
