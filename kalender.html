<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender RT</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #eef2f7;
    }

    /* SIDEBAR */
    .sidebar {
        width: 200px;
        background: #2c3e50;
        color: white;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        padding-top: 20px;
    }
    .sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 18px;
    }
    .sidebar a {
        display: block;
        color: white;
        padding: 12px 20px;
        text-decoration: none;
        margin-bottom: 2px;
        border-left: 4px solid transparent;
    }
    .sidebar a:hover {
        background: #34495e;
        border-left: 4px solid #1abc9c;
    }
    .sidebar a.active {
        border-left: 4px solid #1abc9c;
    }

    /* MAIN CONTENT */
    .main {
        margin-left: 200px;
        padding: 20px;
    }

    h1 {
        color: #2c3e50;
    }

    /* Kalender styling */
    #calendar {
        width: 100%;
        max-width: 900px;
        margin-top: 20px;
        border-collapse: collapse;
    }
    #calendar th, #calendar td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: center;
    }
    #calendar th {
        background-color: #1abc9c;
        color: white;
    }
    #calendar td:hover {
        background-color: #f1f1f1;
        cursor: pointer;
    }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html" class="active">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <h1>Kalender Kegiatan RT</h1>

    <table id="calendar">
        <thead>
            <tr>
                <th>Minggu</th>
                <th>Senin</th>
                <th>Selasa</th>
                <th>Rabu</th>
                <th>Kamis</th>
                <th>Jumat</th>
                <th>Sabtu</th>
            </tr>
        </thead>
        <tbody id="calendar-body">
            <!-- Kalender akan di-generate oleh JS -->
        </tbody>
    </table>
</div>

<script>
    const bulan = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
    const sekarang = new Date();
    const tahun = sekarang.getFullYear();
    const bulanSekarang = sekarang.getMonth();

    function generateCalendar(year, month) {
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const tbody = document.getElementById("calendar-body");
        tbody.innerHTML = "";
        let row = document.createElement("tr");
        let cell;

        // Kosongkan kolom sebelum hari pertama
        for (let i = 0; i < firstDay; i++) {
            cell = document.createElement("td");
            row.appendChild(cell);
        }

        // Isi tanggal
        for (let date = 1; date <= lastDate; date++) {
            if ((firstDay + date - 1) % 7 === 0 && date !== 1) {
                tbody.appendChild(row);
                row = document.createElement("tr");
            }
            cell = document.createElement("td");
            cell.textContent = date;
            row.appendChild(cell);
        }

        // Tambahkan baris terakhir
        tbody.appendChild(row);
    }

    generateCalendar(tahun, bulanSekarang);
</script>

</body>
</html>
