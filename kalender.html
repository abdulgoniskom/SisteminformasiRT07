<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalender Kegiatan RT</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

/* SIDEBAR */

.sidebar{
width:200px;
background:#2c3e50;
height:100vh;
position:fixed;
color:white;
padding-top:20px;
}

.sidebar h2{text-align:center}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{background:#34495e}

/* CONTENT */

.content{
margin-left:200px;
padding:20px;
}

#calendar{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* BUTTON */

.tambah{
background:#27ae60;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
margin-bottom:10px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.popup-content{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
}

/* RESPONSIVE HP */

@media(max-width:768px){

.sidebar{
width:100%;
height:auto;
position:relative;
display:flex;
overflow-x:auto;
}

.sidebar h2{display:none}

.sidebar a{
flex:1;
text-align:center;
font-size:13px;
padding:10px;
}

.content{
margin-left:0;
padding:10px;
}

.popup-content{
width:90%;
}

}

</style>

</head>

<body>

<div class="sidebar">

<h2>RT 01</h2>

<a href="index.html">Dashboard</a>
<a href="kas.html">Kas RT</a>
<a href="warga.html">Data Warga</a>
<a href="pengumuman.html">Pengumuman</a>
<a href="arsip.html">Arsip</a>
<a href="kalender.html">Kalender</a>
<a href="struktur.html">Struktur</a>

</div>

<div class="content">

<h1>Kalender Kegiatan RT</h1>

<button class="tambah" onclick="bukaForm()">+ Tambah Kegiatan</button>

<div id="calendar"></div>

</div>

<!-- POPUP FORM -->

<div class="popup" id="formPopup">

<div class="popup-content">

<h3>Tambah Kegiatan</h3>

<input id="kegiatan" placeholder="Nama kegiatan">

<input type="date" id="tanggal">

<input id="lokasi" placeholder="Lokasi">

<select id="kategori">
<option>Rapat</option>
<option>Sosial</option>
<option>Keamanan</option>
<option>Kesehatan</option>
</select>

<button onclick="simpan()">Simpan</button>
<button onclick="tutupForm()">Batal</button>

</div>

</div>

<script>

const url="https://script.google.com/macros/s/AKfycbxrVFj1yzz2w_M6fOoYVCZynFKKXMevgosDX9Xlwcx4HFdXeU3giM9p0c62NB9M-OBm/exec"

let calendar

document.addEventListener("DOMContentLoaded",function(){

fetch(url)
.then(res=>res.json())
.then(data=>{

let events=data.map(e=>{

let warna="#3498db"

if(e.Kategori=="Rapat") warna="#e74c3c"
if(e.Kategori=="Sosial") warna="#2ecc71"
if(e.Kategori=="Keamanan") warna="#f39c12"
if(e.Kategori=="Kesehatan") warna="#9b59b6"

return{
title:e.Kegiatan,
start:e.Tanggal,
color:warna
}

})

let calendarEl=document.getElementById('calendar')

calendar=new FullCalendar.Calendar(calendarEl,{
initialView:'dayGridMonth',
events:events
})

calendar.render()

})

})

function bukaForm(){
document.getElementById("formPopup").style.display="flex"
}

function tutupForm(){
document.getElementById("formPopup").style.display="none"
}

function simpan(){

let kegiatan=document.getElementById("kegiatan").value
let tanggal=document.getElementById("tanggal").value
let lokasi=document.getElementById("lokasi").value
let kategori=document.getElementById("kategori").value

if(!kegiatan || !tanggal){
alert("Isi kegiatan dan tanggal dulu")
return
}

let formData=new FormData()

formData.append("Kegiatan",kegiatan)
formData.append("Tanggal",tanggal)
formData.append("Lokasi",lokasi)
formData.append("Kategori",kategori)

fetch(url,{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(res=>{
alert("Kegiatan berhasil disimpan")
location.reload()
})
.catch(err=>{
console.log(err)
alert("Gagal menyimpan")
})

}
</script>

</body>
</html>
