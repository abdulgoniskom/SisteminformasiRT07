<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender RT 07</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    background:#eef2f7;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#2c3e50;
    color:white;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    padding-top:20px;
}
.sidebar h2{
    text-align:center;
    padding-bottom:20px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}
.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    margin-bottom:2px;
    border-left:4px solid transparent;
}
.sidebar a:hover{
    background:#34495e;
    border-left:4px solid #1abc9c;
}
.sidebar a.active{
    border-left:4px solid #1abc9c;
}

/* MAIN CONTENT */
.main{
    margin-left:220px;
    padding:20px;
    width:100%;
}
h1{
    color:#2c3e50;
    margin-bottom:20px;
}

/* Kalender table */
.table-container{
    overflow-x:auto;
    width:100%;
}
#calendar{
    border-collapse:collapse;
    width:100%;
    min-width:600px;
}
#calendar th, #calendar td{
    border:1px solid #ccc;
    padding:12px;
    text-align:center;
}
#calendar th{
    background:#1abc9c;
    color:white;
}
#calendar td:hover{
    background:#f1f1f1;
    cursor:pointer;
}

/* Responsive HP */
@media screen and (max-width:768px){
    .sidebar{
        width:60px;
    }
    .sidebar h2{display:none;}
    .sidebar a{font-size:12px;padding:10px 8px;}
    .main{margin-left:60px;padding:10px;}
    #calendar th, #calendar td{
        padding:8px;
        font-size:12px;
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html" class="active">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main">
    <h1>Kalender Kegiatan RT</h1>
    <div class="table-container">
        <table id="calendar">
            <thead>
                <tr>
                    <th>Minggu</th>
                    <th>Senin</th>
                    <th>Selasa</th>
                    <th>Rabu</th>
                    <th>Kamis</th>
                    <th>Jumat</th>
                    <th>Sabtu</th>
                </tr>
            </thead>
            <tbody id="calendar-body">
                <!-- Kalender akan digenerate oleh JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
// Ambil tanggal sekarang
const sekarang = new Date();
const tahun = sekarang.getFullYear();
const bulanSekarang = sekarang.getMonth();

// Generate kalender
function generateCalendar(year, month){
    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();
    const tbody = document.getElementById("calendar-body");
    tbody.innerHTML = "";
    let row = document.createElement("tr");
    let cell;

    // Kosongkan kolom sebelum hari pertama
    for(let i=0;i<firstDay;i++){
        cell = document.createElement("td");
        row.appendChild(cell);
    }

    // Isi tanggal
    for(let date=1;date<=lastDate;date++){
        if((firstDay+date-1)%7===0 && date!==1){
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
        cell = document.createElement("td");
        cell.textContent = date;
        row.appendChild(cell);
    }

    tbody.appendChild(row);
}

generateCalendar(tahun, bulanSekarang);
</script>

</body>
</html>
