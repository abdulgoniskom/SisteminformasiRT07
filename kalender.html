<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Kegiatan RT 07</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { background:#f1f4f9; display:flex; overflow-x: hidden; }

        /* SIDEBAR RESPONSIF */
        .sidebar { 
            width:220px; background:#2c3e50; height:100vh; color:white; 
            position:fixed; transition: 0.3s; z-index: 1000; 
        }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); font-size:18px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover, .active { background:#34495e; border-left: 4px solid #1abc9c; }
        
        /* MAIN CONTENT RESPONSIF */
        .main { margin-left:220px; width:100%; transition: 0.3s; min-width: 0; }
        header { 
            background:white; padding:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); 
            display:flex; justify-content:space-between; align-items: center; 
        }

        .menu-btn { display: none; font-size: 24px; cursor: pointer; color: #2c3e50; }
        .container { padding:15px; }

        /* TABEL KALENDER AGAR BISA DI-SCROLL DI HP */
        .calendar-box { 
            background: white; padding: 15px; border-radius: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; 
        }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #month-year { font-weight: bold; font-size: 18px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 500px; } /* Paksa lebar minimal agar tidak penyet */
        th { background: #f7f9fc; padding: 8px; border: 1px solid #ddd; font-size: 13px; }
        td { border: 1px solid #ddd; height: 80px; vertical-align: top; padding: 5px; }
        
        .date-num { font-weight: bold; font-size: 14px; }
        .today { background: #e3f2fd; border: 2px solid #2f80ed !important; }
        .event-item { font-size: 10px; padding: 3px; border-radius: 3px; margin-top: 2px; color: white; background: #eb5757; word-break: break-all; }
        
        /* KHUSUS TAMPILAN HP (DI BAWAH 768px) */
        @media (max-width: 768px) {
            .sidebar { left: -220px; } /* Sembunyikan sidebar ke kiri */
            .sidebar.open { left: 0; } /* Munculkan saat tombol diklik */

            .menu-btn { display: block; } /* Munculkan tombol garis tiga */

### 3. Tambahkan Script Toggle Sidebar
Tambahkan fungsi ini di dalam tag `<script>` Bapak:

```javascript
    function toggleSidebar() {
        document.getElementById("mySidebar").classList.toggle("open");
    }

    // Klik di luar sidebar untuk menutup saat di HP
    document.addEventListener('click', function(event) {
        var sidebar = document.getElementById('mySidebar');
        var btn = document.querySelector('.menu-btn');
        if (window.innerWidth <= 768 && !sidebar.contains(event.target) && event.target !== btn) {
            sidebar.classList.remove('open');
        }
    });    

</header>

    <div class="container">
        <div class="admin-panel" id="adminPanel">
            <h4 style="margin-bottom:10px">Panel Administrator</h4>
            <button class="btn-add" onclick="inputKegiatan()">+ Tambah Kegiatan Baru</button>
        </div>

        <div class="calendar-box">
            <div class="calendar-nav">
                <button class="btn-nav" onclick="moveMonth(-1)">← Bulan Lalu</button>
                <div id="month-year"></div>
                <button class="btn-nav" onclick="moveMonth(1)">Bulan Depan →</button>
            </div>
            <table id="calendarTable">
                <thead>
                    <tr>
                        <th>Min</th><th>Sen</th><th>Sel</th><th>Rab</th><th>Kam</th><th>Jum</th><th>Sab</th>
                    </tr>
                </thead>
                <tbody id="calendarBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // PENTING: Paste URL Web App Kalender Bapak di sini
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwiUg77Qg3ntKP5ZCPI8vPzD1Gb0wGoI5XI3HKVO2XREJfPEv99wBicC_yvlgx9kjU/exec'; 
    
    let date = new Date();
    let eventsData = {};
    let isAdmin = (localStorage.getItem('rt07_admin_kalender') === 'true');

    function handleAuth() {
        if (isAdmin) {
            localStorage.removeItem('rt07_admin_kalender');
            location.reload();
        } else {
            let pass = prompt("Password Admin Kalender:");
            if (pass === "123") {
                localStorage.setItem('rt07_admin_kalender', 'true');
                location.reload();
            } else { alert("Salah!"); }
        }
    }

    if (isAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('authBtn').innerText = "Logout Admin";
        document.getElementById('authBtn').style.background = "#eb5757";
    }

    async function fetchEvents() {
        try {
            const response = await fetch(scriptURL);
            eventsData = await response.json();
            renderCalendar();
        } catch (e) { 
            alert("Gagal menyambung ke server. Pastikan URL API benar dan sudah di-Deploy sebagai 'Anyone'."); 
        }
    }

    function renderCalendar() {
        const year = date.getFullYear();
        const month = date.getMonth();
        const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        document.getElementById("month-year").innerText = months[month] + " " + year;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const tbody = document.getElementById("calendarBody");
        tbody.innerHTML = "";

        let row = document.createElement("tr");
        for (let i = 0; i < firstDay; i++) row.appendChild(document.createElement("td"));

        for (let d = 1; d <= lastDate; d++) {
            if ((firstDay + d - 1) % 7 === 0 && d !== 1) {
                tbody.appendChild(row);
                row = document.createElement("tr");
            }
            let cell = document.createElement("td");
            let tglKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            if (tglKey === new Date().toISOString().split('T')[0]) cell.classList.add('today');

            let html = `<span class="date-num">${d}</span>`;
            if (eventsData[tglKey]) {
                html += `<div class="event-item"><b>${eventsData[tglKey].kegiatan}</b><br><small>📍 ${eventsData[tglKey].lokasi}</small></div>`;
            }
            cell.innerHTML = html;
            row.appendChild(cell);
        }
        tbody.appendChild(row);
    }

    function moveMonth(v) {
        date.setMonth(date.getMonth() + v);
        renderCalendar();
    }

    async function inputKegiatan() {
        const tgl = prompt("Tanggal (Format: YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
        const keg = prompt("Nama Kegiatan:");
        const lok = prompt("Lokasi:");
        const kat = prompt("Kategori (Rapat/Umum/Bakti):");

        if (tgl && keg) {
            alert("Sedang menyimpan...");
            await fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ tanggal: tgl, kegiatan: keg, lokasi: lok, kategori: kat })
            });
            location.reload();
        }
    }

    fetchEvents();
</script>
</body>
</html>
