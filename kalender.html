<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender Kegiatan RT</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
body{
    font-family:Arial, sans-serif;
    margin:0;
    background:#eef2f7;
}

/* Sidebar */
.sidebar{
    width:200px;
    background:#2c3e50;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    padding-top:20px;
    color:white;
    transition: all 0.3s;
}
.sidebar h2{
    text-align:center;
    margin-bottom:25px;
}
.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px 20px;
}
.sidebar a:hover{
    background:#34495e;
}

/* Content */
.content{
    margin-left:200px;
    padding:20px;
}

/* Kalender */
#calendar{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* Responsive */
@media(max-width:768px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
        display:flex;
        overflow-x:auto;
    }
    .sidebar h2{display:none;}
    .sidebar a{
        flex:1;
        text-align:center;
        font-size:13px;
        padding:10px;
    }
    .content{
        margin-left:0;
        padding:10px;
    }
}
</style>
</head>

<body>

<div class="sidebar">
<h2>RT 01</h2>
<a href="index.html">Dashboard</a>
<a href="kas.html">Kas RT</a>
<a href="warga.html">Data Warga</a>
<a href="pengumuman.html">Pengumuman</a>
<a href="arsip.html">Arsip</a>
<a href="kalender.html">Kalender</a>
<a href="struktur.html">Struktur</a>
</div>

<div class="content">
<h1>Kalender Kegiatan RT</h1>
<div id="calendar"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let calendarEl = document.getElementById('calendar');

    let calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        height: 'auto',
        events: [] // Untuk sementara kosong
    });

    calendar.render();
});
</script>

</body>
</html>
