<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman RT 07 - Admin Panel</title>
    <style>
        /* CSS DASAR */
        *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body{ background:#eef2f7; display:flex; }

        /* SIDEBAR */
        .sidebar{ width:220px; background:#2c3e50; height:100vh; color:white; position:fixed; }
        .sidebar h2{ text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); font-size:18px; }
        .sidebar a{ display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover{ background:#34495e; border-left: 4px solid #1abc9c; }
        .active{ background:#34495e; border-left: 4px solid #1abc9c; }

        /* MAIN CONTENT */
        .main{ margin-left:220px; width:100%; }
        header{ background:#2f80ed; color:white; padding:15px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        
        .container{ padding:20px; max-width:900px; margin:auto; }
        
        /* TOMBOL ATAS */
        .top-bar{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        button{ background:#2f80ed; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; font-weight: bold; }
        button:hover{ background:#1f6fd1; }
        .btn-logout{ background: #eb5757; }

        /* FORM INPUT */
        .form-box{ display:none; background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .form-box h3{ margin-bottom: 15px; color: #2c3e50; border-bottom: 2px solid #f2994a; display: inline-block; }
        input{ width:100%; padding:12px; margin:10px 0; border: 1px solid #ddd; border-radius: 5px; }

        /* KARTU PENGUMUMAN */
        .card{ background:white; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.1); position: relative; animation: fadeIn 0.5s; }
        .card img{ max-width:100%; border-radius:5px; margin-bottom:10px; display: block; max-height: 300px; object-fit: cover; }
        .card h3{ margin:0; font-size: 18px; color: #2c3e50; line-height: 1.4; }
        
        /* TOMBOL HAPUS */
        .btn-delete {
            background: #e74c3c; color: white; border: none; padding: 6px 12px; 
            border-radius: 4px; cursor: pointer; position: absolute; top: 15px; right: 15px; font-size: 12px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* RESPONSIVE HP */
        @media (max-width:768px){
            .sidebar{ width:70px; } .sidebar h2, .sidebar span { display:none; }
            .main{ margin-left:70px; }
            header h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>RT 07</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html" class="active">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main">
    <header><h2>Pengelolaan Pengumuman</h2></header>
    <div class="container">

        <div class="top-bar">
            <div id="statusInfo" style="font-weight: bold; color: #7f8c8d;">Mode: Warga</div>
            <button id="authBtn" onclick="handleAuth()">Login Admin</button>
        </div>

        <div class="form-box" id="formInput">
            <h3>Buat Pengumuman Baru</h3>
            <input type="text" id="judul" placeholder="Ketik isi pengumuman/informasi di sini...">
            <input type="text" id="gambar" placeholder="Link Gambar Google Drive (Kosongkan jika tidak ada)">
            <button id="btnSimpan" onclick="simpan()" style="width: 100%; background: #27ae60;">Publikasikan Sekarang</button>
        </div>

        <div id="listPengumuman">
            <p style="text-align: center; padding: 20px;">Memuat informasi...</p>
        </div>

    </div>
</div>

<script>
// PENTING: Ganti dengan URL Web App Apps Script khusus Pengumuman Bapak
const API = "https://script.google.com/macros/s/AKfycbxUgsRBttcAHJye9WJZolA5Ptzy5NHpsgfB0XtVAjmtsD3BK5uDDk0jQ2-preCJaIs/exec"; 

let isAdmin = (localStorage.getItem('admin_pengumuman') === 'true');

// Fungsi Auth (Login/Logout)
function handleAuth() {
    if (isAdmin) {
        localStorage.removeItem('admin_pengumuman');
        location.reload();
    } else {
        let p = prompt("Masukkan Password Admin:");
        if(p === "12345") { // Ganti password sesuai keinginan Bapak
            localStorage.setItem('admin_pengumuman', 'true');
            alert("Selamat Datang, Pak RT!");
            location.reload();
        } else {
            alert("Password Salah!");
        }
    }
}

// Cek tampilan saat halaman dimuat
function checkView() {
    if (isAdmin) {
        document.getElementById("formInput").style.display = "block";
        document.getElementById("authBtn").innerText = "Logout Admin";
        document.getElementById("authBtn").classList.add("btn-logout");
        document.getElementById("statusInfo").innerText = "Mode: Administrator";
        document.getElementById("statusInfo").style.color = "#27ae60";
    }
}

// Ambil data pengumuman
function loadData(){
    fetch(API + "?sheet=Pengumuman")
    .then(res => res.json())
    .then(data => {
        let reversedData = [...data].reverse(); 
        let html = "";
        if(reversedData.length === 0) {
            html = "<p style='text-align:center; color:#95a5a6;'>Belum ada pengumuman yang diterbitkan.</p>";
        }
        reversedData.forEach((d) => {
            html += `
                <div class="card">
                    ${isAdmin ? `<button class="btn-delete" onclick="hapus('${d.judul}')">Hapus</button>` : ""}
                    ${d.gambar ? `<img src="${d.gambar}" alt="gambar">` : ""}
                    <h3>${d.judul}</h3>
                </div>`;
        });
        document.getElementById("listPengumuman").innerHTML = html;
    })
    .catch(err => {
        document.getElementById("listPengumuman").innerHTML = "Gagal menyambung ke server.";
    });
}

// Simpan data
function simpan(){
    let judul = document.getElementById("judul").value.trim();
    let gambar = document.getElementById("gambar").value.trim();
    
    if(!judul){ alert("Judul pengumuman tidak boleh kosong!"); return; }

    document.getElementById("btnSimpan").innerText = "Sedang Mengirim...";
    document.getElementById("btnSimpan").disabled = true;

    let params = new URLSearchParams();
    params.append("action", "insert");
    params.append("judul", judul);
    params.append("gambar", gambar);

    fetch(API, {
        method: "POST",
        body: params.toString(),
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    })
    .then(res => res.text())
    .then(res => {
        alert("Pengumuman berhasil dipublikasikan!");
        location.reload();
    })
    .catch(err => {
        alert("Terjadi kesalahan saat menyimpan.");
        document.getElementById("btnSimpan").innerText = "Publikasikan Sekarang";
        document.getElementById("btnSimpan").disabled = false;
    });
}

// Hapus data
function hapus(judul) {
    if(confirm("Apakah Bapak yakin ingin menghapus pengumuman ini?\n\n\"" + judul + "\"")) {
        let params = new URLSearchParams();
        params.append("action", "delete");
        params.append("judul", judul);

        fetch(API, {
            method: "POST",
            body: params.toString(),
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        })
        .then(() => {
            alert("Pengumuman telah dihapus.");
            loadData();
        });
    }
}

checkView();
loadData();
</script>
</body>
</html>
