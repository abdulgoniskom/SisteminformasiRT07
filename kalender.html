<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender RT 07 - Sistem Informasi</title>
    <style>
        /* CSS DASAR DARI INDEX.HTML */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f1f4f9;
            display:flex;
        }

        /* SIDEBAR (Identik dengan index.html) */
        .sidebar{
            width:220px;
            background:#2c3e50;
            height:100vh;
            color:white;
            position:fixed;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar h2{
            text-align:center;
            padding:20px;
            border-bottom:1px solid rgba(255,255,255,0.2);
        }

        .sidebar a{
            display:block;
            color:white;
            padding:15px;
            text-decoration:none;
        }

        .sidebar a:hover, .sidebar a.active{
            background:#34495e;
        }

        /* Tombol Login di Sidebar */
        .admin-section {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }
        .btn-login {
            width: 100%;
            padding: 10px;
            background: #f2994a;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* MAIN CONTENT */
        .main{
            margin-left:220px;
            width:100%;
            transition: 0.3s;
        }

        header{
            background:white;
            padding:15px 30px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
            display:flex;
            justify-content:space-between;
            align-items: center;
        }

        .container{
            padding:30px;
        }

        /* MOBILE MENU TOGGLE (Hanya muncul di HP) */
        .menu-btn {
            display: none;
            font-size: 24px;
            cursor: pointer;
        }

        /* KALENDER STYLE */
        .calendar-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #month-year { font-weight: bold; font-size: 20px; }
        .btn-nav { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f7f9fc; padding: 15px; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; height: 110px; vertical-align: top; padding: 10px; width: 14.28%; }
        
        .date-num { font-weight: bold; }
        .today { background: #e3f2fd; border: 2px solid #2f80ed !important; }

        .event-item {
            font-size: 11px;
            padding: 4px;
            border-radius: 3px;
            margin-top: 5px;
            color: white;
            background: #2f80ed;
        }

        /* ADMIN INPUT PANEL */
        #adminPanel {
            display: none;
            margin-bottom: 20px;
        }
        .btn-add {
            background: #27ae60;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* RESPONSIVE HP */
        @media screen and (max-width: 768px) {
            .sidebar {
                left: -220px;
            }
            .sidebar.open {
                left: 0;
            }
            .main {
                margin-left: 0;
            }
            .menu-btn {
                display: block;
            }
            .container {
                padding: 15px;
            }
            header h2 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html" class="active">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>

    <div class="admin-section">
        <button class="btn-login" id="authBtn" onclick="handleAuth()">Login Admin</button>
    </div>
</div>

<div class="main">
    <header>
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <h2>Kalender Kegiatan RT 07</h2>
        <div id="statusUser" style="font-size: 12px; color: #7f8c8d;">Mode Warga</div>
    </header>

    <div class="container">
        <div id="adminPanel">
            <button class="btn-add" onclick="inputKegiatan()">+ Input Kegiatan RT</button>
        </div>

        <div class="calendar-box">
            <div class="calendar-nav">
                <button class="btn-nav" onclick="moveMonth(-1)">← Prev</button>
                <div id="month-year"></div>
                <button class="btn-nav" onclick="moveMonth(1)">Next →</button>
            </div>

            <table id="calendarTable">
                <thead>
                    <tr>
                        <th>Min</th><th>Sen</th><th>Sel</th><th>Rab</th><th>Kam</th><th>Jum</th><th>Sab</th>
                    </tr>
                </thead>
                <tbody id="calendarBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwgNiCSbVTZV3BduoQZCQsGynBBnn25eTg6RF2Z3IUKQTmL0mBn8Y3JpW-7DuViv6s/exec';
    let date = new Date();
    let eventsData = {};

    // FUNGSI SIDEBAR MOBILE
    function toggleSidebar() {
        document.getElementById("mySidebar").classList.toggle("open");
    }

    // FUNGSI LOGIN ADMIN
    function handleAuth() {
        const role = localStorage.getItem('rt07_admin');
        if (role === 'true') {
            localStorage.removeItem('rt07_admin');
            alert("Logout berhasil");
            location.reload();
        } else {
            const pass = prompt("Masukkan Password Admin:");
            if (pass === "123") { // Silakan ganti passwordnya di sini
                localStorage.setItem('rt07_admin', 'true');
                alert("Login Admin Berhasil!");
                location.reload();
            } else {
                alert("Password Salah!");
            }
        }
    }

    // CEK STATUS LOGIN SAAT HALAMAN DIBUKA
    function checkAdmin() {
        if (localStorage.getItem('rt07_admin') === 'true') {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('authBtn').innerText = "Logout Admin";
            document.getElementById('authBtn').style.background = "#eb5757";
            document.getElementById('statusUser').innerText = "Mode Administrator";
            document.getElementById('statusUser').style.color = "#27ae60";
        }
    }

    // LOAD DATA DARI GOOGLE SHEETS
    async function fetchEvents() {
        try {
            const response = await fetch(scriptURL);
            eventsData = await response.json();
            renderCalendar();
        } catch (e) { console.error("Gagal ambil data"); }
    }

    function renderCalendar() {
        const year = date.getFullYear();
        const month = date.getMonth();
        const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        document.getElementById("month-year").innerText = months[month] + " " + year;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const tbody = document.getElementById("calendarBody");
        tbody.innerHTML = "";

        let row = document.createElement("tr");
        for (let i = 0; i < firstDay; i++) row.appendChild(document.createElement("td"));

        for (let d = 1; d <= lastDate; d++) {
            if ((firstDay + d - 1) % 7 === 0 && d !== 1) {
                tbody.appendChild(row);
                row = document.createElement("tr");
            }
            let cell = document.createElement("td");
            let tglKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            if (tglKey === new Date().toISOString().split('T')[0]) cell.classList.add('today');

            let html = `<span class="date-num">${d}</span>`;
            if (eventsData[tglKey]) {
                html += `<div class="event-item"><b>${eventsData[tglKey].kegiatan}</b><br><small>📍 ${eventsData[tglKey].lokasi}</small></div>`;
            }
            cell.innerHTML = html;
            row.appendChild(cell);
        }
        tbody.appendChild(row);
    }

    function moveMonth(v) {
        date.setMonth(date.getMonth() + v);
        renderCalendar();
    }

    async function inputKegiatan() {
        const tgl = prompt("Tanggal (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
        const keg = prompt("Nama Kegiatan:");
        const lok = prompt("Lokasi:");
        const kat = prompt("Kategori (Rapat/Umum/Bakti):");

        if (tgl && keg) {
            alert("Sedang menyimpan ke Google Sheets...");
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ tanggal: tgl, kegiatan: keg, lokasi: lok, kategori: kat })
            });
            location.reload();
        }
    }

    checkAdmin();
    fetchEvents();
</script>

</body>
</html>
