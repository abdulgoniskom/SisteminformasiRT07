<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender RT 07</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    background:#eef2f7;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#2c3e50;
    color:white;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    padding-top:20px;
}
.sidebar h2{
    text-align:center;
    padding-bottom:20px;
    border-bottom:1px solid rgba(255,255,255,0.2);
}
.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    margin-bottom:2px;
    border-left:4px solid transparent;
}
.sidebar a:hover{
    background:#34495e;
    border-left:4px solid #1abc9c;
}
.sidebar a.active{
    border-left:4px solid #1abc9c;
}

/* MAIN CONTENT */
.main{
    margin-left:220px;
    padding:20px;
    width:100%;
}
h1{
    color:#2c3e50;
    margin-bottom:20px;
}

/* Kalender header & nav */
.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}
.calendar-header button{
    background:#1abc9c;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}
.calendar-header button:hover{
    background:#16a085;
}
#month-year{
    font-weight:bold;
    font-size:18px;
}

/* Kalender table */
.table-container{
    overflow-x:auto;
    width:100%;
}
#calendar{
    border-collapse:collapse;
    width:100%;
    min-width:600px;
}
#calendar th, #calendar td{
    border:1px solid #ccc;
    padding:12px;
    text-align:center;
    height:50px;
}
#calendar th{
    background:#1abc9c;
    color:white;
}
#calendar td.today{
    background:#f39c12;
    color:white;
    font-weight:bold;
    border-radius:50%;
}
#calendar td.event{
    background:#3498db;
    color:white;
    font-weight:bold;
    border-radius:50%;
}
#calendar td:hover{
    background:#f1f1f1;
    cursor:pointer;
}

/* Responsive HP */
@media screen and (max-width:768px){
    .sidebar{
        width:60px;
    }
    .sidebar h2{display:none;}
    .sidebar a{font-size:12px;padding:10px 8px;}
    .main{margin-left:60px;padding:10px;}
    #calendar th, #calendar td{
        padding:8px;
        font-size:12px;
    }
    .calendar-header button{
        padding:6px 10px;
        font-size:12px;
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html" class="active">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main">
    <h1>Kalender Kegiatan RT</h1>

    <div class="calendar-header">
        <button id="prev">&#8592; Prev</button>
        <div id="month-year">Maret 2026</div>
        <button id="next">Next &#8594;</button>
    </div>

    <div class="table-container">
        <table id="calendar">
            <thead>
                <tr>
                    <th>Minggu</th>
                    <th>Senin</th>
                    <th>Selasa</th>
                    <th>Rabu</th>
                    <th>Kamis</th>
                    <th>Jumat</th>
                    <th>Sabtu</th>
                </tr>
            </thead>
            <tbody id="calendar-body">
                <!-- Kalender akan digenerate oleh JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
const sekarang = new Date();
let tahun = sekarang.getFullYear();
let bulan = sekarang.getMonth();

// Contoh event/tanggal kegiatan
const events = {
    "2026-03-10":"Rapat RT",
    "2026-03-17":"Gotong Royong",
    "2026-03-25":"Pengajian"
};

function generateCalendar(year, month){
    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();
    const tbody = document.getElementById("calendar-body");
    tbody.innerHTML = "";

    const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    document.getElementById("month-year").textContent = `${monthNames[month]} ${year}`;

    let row = document.createElement("tr");
    let cell;

    // Kosongkan kolom sebelum hari pertama
    for(let i=0;i<firstDay;i++){
        cell = document.createElement("td");
        row.appendChild(cell);
    }

    for(let date=1;date<=lastDate;date++){
        if((firstDay+date-1)%7===0 && date!==1){
            tbody.appendChild(row);
            row = document.createElement("tr");
        }
        cell = document.createElement("td");
        const fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
        cell.textContent = date;

        if(fullDate === new Date().toISOString().split('T')[0]){
            cell.classList.add("today");
        }
        if(events[fullDate]){
            cell.classList.add("event");
            cell.title = events[fullDate];
        }

        row.appendChild(cell);
    }
    tbody.appendChild(row);
}

document.getElementById("prev").addEventListener("click",()=>{
    bulan--;
    if(bulan<0){bulan=11; tahun--;}
    generateCalendar(tahun, bulan);
});
document.getElementById("next").addEventListener("click",()=>{
    bulan++;
    if(bulan>11){bulan=0; tahun++;}
    generateCalendar(tahun, bulan);
});

generateCalendar(tahun, bulan);
</script>

</body>
</html>
