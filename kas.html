<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kas RT 07</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background:#f4f7fa; display:flex; }
        .sidebar { width:220px; background:#2c3e50; height:100vh; color:white; position:fixed; transition: 0.3s; z-index: 1000; left: 0; }
        .sidebar.closed { left: -220px; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid #3e4f5f; font-size:16px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; }
        .main { margin-left:220px; width:100%; transition: 0.3s; }
        .main.expanded { margin-left: 0; }
        header { background:#2f80ed; color:white; padding:15px; display:flex; justify-content:space-between; align-items: center; sticky; top: 0; }
        .container { padding:20px; max-width:1100px; margin:auto; }
        .card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        button { border:none; padding:8px 12px; border-radius:5px; cursor:pointer; font-weight:bold; color:white; }
        .btn-blue { background:#2f80ed; }
        .btn-green { background:#27ae60; }
        .btn-red { background:#e74c3c; }
        .btn-orange { background:#f39c12; }
        table { width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; }
        th, td { border-bottom:1px solid #eee; padding:10px; text-align:center; }
        th { background:#f8f9fa; }
        .formInput { display:none; border-top: 2px dashed #ddd; margin-top:20px; padding-top:20px; }
        input, select { padding:8px; border:1px solid #ddd; border-radius:5px; width:100%; }
        @media (max-width: 768px) { .sidebar { left:-220px; } .sidebar.open { left:0; } .main { margin-left:0; } .aksi-btns { display: flex; flex-direction: column; gap: 5px; } }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html" class="active">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="arsip.html">Arsip Surat</a>
    <a href="lapor.html">Lapor Warga</a>
</div>

<div class="main" id="mainContent">
    <header>
        <div style="display:flex; align-items:center;">
            <div onclick="toggleSidebar()" style="font-size:24px; cursor:pointer; margin-right:15px;">☰</div>
            <h2 style="font-size:15px;">Admin Kas RT 07</h2>
        </div>
        <button id="loginBtn" class="btn-blue">Login</button>
        <button id="logoutBtn" class="btn-red" style="display:none">Logout</button>
    </header>

    <div class="container">
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                <select id="sheet" onchange="loadData()"><option value="Kas_RT">Kas RT</option><option value="Kas_Agustusan">Kas Agustusan</option></select>
                <select id="filterBulan" onchange="loadData()">
                    <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                    <option value="12" selected>Desember</option>
                </select>
            </div>
            <button onclick="cetakPDF()" class="btn-green" style="width:100%">🧾 Cetak Laporan PDF</button>

            <div class="formInput" id="formInput">
                <h3 id="formTitle">📝 Tambah Transaksi</h3>
                <input type="hidden" id="editRowId">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <input type="date" id="tanggal" onchange="autoSetPeriode()">
                    <input type="text" id="ket" placeholder="Keterangan">
                    <input type="number" id="masuk" placeholder="Masuk (Rp)">
                    <input type="number" id="keluar" placeholder="Keluar (Rp)">
                    <select id="inBln"><option value="12">Laporan Des</option><option value="1">Laporan Jan</option></select>
                    <input type="number" id="inThn" value="2025">
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button id="btnSimpan" onclick="simpan()" class="btn-blue" style="flex:2;">Simpan Data</button>
                    <button id="btnBatal" onclick="resetForm()" class="btn-red" style="flex:1; display:none;">Batal</button>
                </div>
            </div>
        </div>

        <div class="card" style="overflow-x:auto;">
            <table>
                <thead><tr><th>Tgl</th><th>Keterangan</th><th>Masuk</th><th>Keluar</th><th>Saldo</th><th class="admin-only" style="display:none">Aksi</th></tr></thead>
                <tbody id="tabel"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxFO0_ty70BIBIoCGoWmZUr5G_BIXIbTmV_HVtoHvkJG9r1FoN9xI-3jP6emycY0rk/exec"; 
    let masterData = [];
    let isAdmin = false;

    function toggleSidebar() {
        const s = document.getElementById("mySidebar");
        const m = document.getElementById("mainContent");
        window.innerWidth > 768 ? (s.classList.toggle("closed"), m.classList.toggle("expanded")) : s.classList.toggle("open");
    }

    function autoSetPeriode() {
        const d = new Date(document.getElementById("tanggal").value);
        let m = d.getMonth(); let y = d.getFullYear();
        if (m === 0) { document.getElementById("inBln").value = "12"; document.getElementById("inThn").value = y - 1; }
        else { document.getElementById("inBln").value = m; document.getElementById("inThn").value = y; }
    }

    function loadData() {
        const s = document.getElementById("sheet").value;
        const fB = document.getElementById("filterBulan").value;
        fetch(`${API_URL}?sheet=${s}`).then(r => r.json()).then(data => {
            masterData = data;
            let html = ""; let sJalan = 0;
            data.forEach(d => {
                let m = Number(d.masuk)||0; let k = Number(d.keluar)||0;
                sJalan += (m - k);
                if (String(d.bulan_laporan) === String(fB)) {
                    html += `<tr>
                        <td>${new Date(d.tanggal).toLocaleDateString("id-ID")}</td>
                        <td style="text-align:left">${d.keterangan}</td>
                        <td style="color:green">${m.toLocaleString()}</td>
                        <td style="color:red">${k.toLocaleString()}</td>
                        <td style="font-weight:bold">${sJalan.toLocaleString()}</td>
                        <td class="admin-only" style="${isAdmin ? '' : 'display:none'}">
                            <div class="aksi-btns">
                                <button onclick="editData(${d.row_id})" class="btn-orange" style="padding:4px 8px; font-size:10px;">Edit</button>
                                <button onclick="hapusData(${d.row_id})" class="btn-red" style="padding:4px 8px; font-size:10px;">Hapus</button>
                            </div>
                        </td>
                    </tr>`;
                }
            });
            document.getElementById("tabel").innerHTML = html || '<tr><td colspan="6">Data Kosong</td></tr>';
        });
    }

    async function simpan() {
        const rowId = document.getElementById("editRowId").value;
        const payload = {
            action: rowId ? "update_kas" : "insert_kas",
            row_id: rowId,
            sheet: document.getElementById("sheet").value,
            tanggal: document.getElementById("tanggal").value,
            keterangan: document.getElementById("ket").value,
            masuk: document.getElementById("masuk").value,
            keluar: document.getElementById("keluar").value,
            bulan_laporan: document.getElementById("inBln").value,
            tahun_laporan: document.getElementById("inThn").value
        };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        alert("Berhasil!"); resetForm(); loadData();
    }

    function editData(rowId) {
        const item = masterData.find(d => d.row_id === rowId);
        document.getElementById("editRowId").value = item.row_id;
        document.getElementById("tanggal").value = new Date(item.tanggal).toISOString().split('T')[0];
        document.getElementById("ket").value = item.keterangan;
        document.getElementById("masuk").value = item.masuk;
        document.getElementById("keluar").value = item.keluar;
        document.getElementById("inBln").value = item.bulan_laporan;
        document.getElementById("inThn").value = item.tahun_laporan;
        document.getElementById("formTitle").innerText = "Edit Transaksi Row: " + rowId;
        document.getElementById("btnBatal").style.display = "inline";
        window.scrollTo(0,0);
    }

    async function hapusData(rowId) {
        if(confirm("Hapus data ini?")) {
            const p = { action: "delete_kas", row_id: rowId, sheet: document.getElementById("sheet").value };
            await fetch(API_URL, { method: "POST", body: JSON.stringify(p) });
            loadData();
        }
    }

    function resetForm() {
        document.getElementById("editRowId").value = "";
        document.getElementById("formTitle").innerText = "📝 Tambah Transaksi";
        document.getElementById("btnBatal").style.display = "none";
        document.querySelectorAll(".formInput input").forEach(i => i.value = "");
    }

    document.getElementById("loginBtn").onclick = () => {
        if(prompt("Pass:") === "Bumiindah07") {
            isAdmin = true;
            document.getElementById("formInput").style.display="block";
            document.getElementById("loginBtn").style.display="none";
            document.getElementById("logoutBtn").style.display="inline";
            document.querySelectorAll(".admin-only").forEach(el => el.style.display="");
            loadData();
        }
    };

    loadData();
</script>
</body>
</html>
