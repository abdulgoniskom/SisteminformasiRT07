<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kas RT - RT 07 RW 09</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
        body { background:#eef2f7; display:flex; overflow-x: hidden; }

        /* SIDEBAR STYLE (Sama dengan arsip.html) */
        .sidebar { 
            width:220px; background:#2c3e50; height:100vh; color:white; 
            position:fixed; transition: 0.3s; z-index: 1000; left: 0;
        }
        .sidebar.closed { left: -220px; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); font-size:18px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover { background:#34495e; border-left: 4px solid #1abc9c; }
        .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; font-weight: bold; }
        
        /* AREA UTAMA */
        .main { margin-left:220px; width:100%; transition: 0.3s; min-height: 100vh; }
        .main.expanded { margin-left: 0; }

        header { 
            background:#2f80ed; color:white; padding:15px; 
            display:flex; justify-content:space-between; align-items: center; 
            position: sticky; top: 0; z-index: 900;
        }

        .menu-btn { font-size: 24px; cursor: pointer; color: white; margin-right: 15px; }
        .header-left { display: flex; align-items: center; }

        /* KONTEN KAS */
        .container { padding:20px; max-width:1000px; margin:auto; }
        .card { 
            background:white; padding:15px; border-radius:10px; 
            margin-bottom:20px; box-shadow:0 4px 8px rgba(0,0,0,0.1); 
        }

        button { background:#2f80ed; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; font-weight: bold; }
        .logout { background:red; }

        table { width:100%; border-collapse:collapse; min-width:600px; }
        th,td { border-bottom:1px solid #ddd; padding:10px; text-align:center; font-size:13px; }
        th { background:#2f80ed; color:white; }
        tr:hover { background:#f5f9ff; }

        .masuk { color:#2f80ed; font-weight:bold; }
        .keluar { color:#eb5757; font-weight:bold; }

        input, select { padding:8px; margin:5px; border: 1px solid #ddd; border-radius: 4px; }
        .formInput { display:none; margin-top: 20px; border-top: 2px dashed #2f80ed; padding-top: 15px; }

        @media (max-width: 768px) {
            .sidebar { left: -220px; }
            .sidebar.open { left: 0; }
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html" class="active">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main" id="mainContent">
    <header>
        <div class="header-left">
            <div class="menu-btn" onclick="toggleSidebar()">☰</div>
            <h2 style="font-size: 16px;">Laporan Kas RT 07 RW 09 Bumi Indah City</h2>
        </div>
        <div class="header-right">
            <button id="loginBtn">Login Admin</button>
            <button id="logoutBtn" class="logout" style="display:none">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="toolbar">
                <select id="sheet" onchange="loadData()">
                    <option value="Kas_RT">Kas RT</option>
                    <option value="Kas_Agustusan">Kas Agustusan</option>
                </select>

                <select id="filterTahun" onchange="loadData()">
                    <option value="">Semua Tahun</option>
                </select>

                <select id="filterTriwulan" onchange="loadData()">
                    <option value="">Semua Triwulan</option>
                    <option value="1">Triwulan 1 (Jan–Mar)</option>
                    <option value="2">Triwulan 2 (Apr–Jun)</option>
                    <option value="3">Triwulan 3 (Jul–Sep)</option>
                    <option value="4">Triwulan 4 (Okt–Des)</option>
                </select>

                <select id="filterBulan" onchange="loadData()">
                    <option value="">Semua Bulan</option>
                    <option value="1">Januari</option>
                    <option value="2">Februari</option>
                    <option value="3">Maret</option>
                    <option value="4">April</option>
                    <option value="5">Mei</option>
                    <option value="6">Juni</option>
                    <option value="7">Juli</option>
                    <option value="8">Agustus</option>
                    <option value="9">September</option>
                    <option value="10">Oktober</option>
                    <option value="11">November</option>
                    <option value="12">Desember</option>
                </select>

                <button onclick="cetakPDF()">🧾 Cetak Laporan Kas</button>
            </div>

            <h3 id="saldo" style="margin-top:15px; color:#2c3e50;">Saldo : Rp 0</h3>

            <div class="formInput" id="formInput">
                <h3>Input Transaksi</h3>
                <input type="date" id="tanggal">
                <input type="text" id="ket" placeholder="Keterangan">
                <input type="number" id="masuk" placeholder="Kas Masuk">
                <input type="number" id="keluar" placeholder="Kas Keluar">
                <input type="text" id="bukti" placeholder="Link Bukti">
                <button onclick="simpan()">Simpan Data</button>
            </div>
        </div>

        <div class="card">
            <div style="overflow-x:auto">
                <table>
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Keterangan</th>
                            <th>Masuk</th>
                            <th>Keluar</th>
                            <th>Bukti</th>
                            <th>Saldo</th>
                        </tr>
                    </thead>
                    <tbody id="tabel"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
    // --- FUNGSI SIDEBAR ---
    function toggleSidebar() {
        const sidebar = document.getElementById("mySidebar");
        const main = document.getElementById("mainContent");
        if (window.innerWidth > 768) {
            sidebar.classList.toggle("closed");
            main.classList.toggle("expanded");
        } else {
            sidebar.classList.toggle("open");
        }
    }

    // --- LOGIKA PROGRAM KAS RT ---
    const API="https://script.google.com/macros/s/AKfycbxA1WFwM45lBSZMnEx87w53x8IVv-nOYUNRfaHZSuGLsuDgfIUlxhxq5UOqz7XafXk/exec";
    let chart;

    function rupiah(angka){
        if(!angka || angka==0) return "-";
        return "Rp "+Number(angka).toLocaleString("id-ID");
    }

    // Login & Logout
    document.getElementById("loginBtn").onclick=function(){
        let u=prompt("Username");
        let p=prompt("Password");
        if(u=="admin" && p=="12345"){
            document.getElementById("formInput").style.display="block";
            document.getElementById("loginBtn").style.display="none";
            document.getElementById("logoutBtn").style.display="inline";
        } else { alert("Login gagal"); }
    }

    document.getElementById("logoutBtn").onclick=function(){
        document.getElementById("formInput").style.display="none";
        document.getElementById("loginBtn").style.display="inline";
        document.getElementById("logoutBtn").style.display="none";
    }

    function isiTahun(data){
        let tahunSet=new Set();
        data.forEach(d=>{
            let t=new Date(d.tanggal).getFullYear();
            tahunSet.add(t);
        });
        let select=document.getElementById("filterTahun");
        let valLama = select.value;
        select.innerHTML='<option value="">Semua Tahun</option>';
        [...tahunSet].sort().forEach(t=>{
            select.innerHTML+=`<option value="${t}">${t}</option>`;
        });
        select.value = valLama;
    }

    function loadData(){
        let sheet=document.getElementById("sheet").value;
        let bulanFilter=document.getElementById("filterBulan").value;
        let tahunFilter=document.getElementById("filterTahun").value;
        let triwulanFilter=document.getElementById("filterTriwulan").value;

        fetch(API+"?sheet="+sheet)
        .then(r=>r.json())
        .then(data=>{
            isiTahun(data);
            let html="";
            let saldo=0;
            let masukTotal=0;
            let keluarTotal=0;

            data.forEach(d=>{
                let tgl=new Date(d.tanggal);
                let bulan=tgl.getMonth()+1;
                let tahun=tgl.getFullYear();
                let triwulan=Math.ceil(bulan/3);

                if(bulanFilter && bulan!=bulanFilter) return;
                if(tahunFilter && tahun!=tahunFilter) return;
                if(triwulanFilter && triwulan!=triwulanFilter) return;

                saldo+=Number(d.masuk)-Number(d.keluar);
                masukTotal+=Number(d.masuk);
                keluarTotal+=Number(d.keluar);

                html+=`<tr>
                    <td>${tgl.toLocaleDateString("id-ID")}</td>
                    <td>${d.keterangan}</td>
                    <td class="masuk">${rupiah(d.masuk)}</td>
                    <td class="keluar">${rupiah(d.keluar)}</td>
                    <td>${d.bukti?`<a href="${d.bukti}" target="_blank">Lihat</a>`:"-"}</td>
                    <td>${rupiah(saldo)}</td>
                </tr>`;
            });

            document.getElementById("tabel").innerHTML=html;
            document.getElementById("saldo").innerHTML="Saldo : "+rupiah(masukTotal-keluarTotal);

            if(chart) chart.destroy();
            chart = new Chart(document.getElementById("chart"), {
                type: "doughnut",
                data: {
                    labels: ["Masuk","Keluar"],
                    datasets: [{
                        data: [masukTotal, keluarTotal],
                        backgroundColor:["#2f80ed","#eb5757"]
                    }]
                },
                options: {
                    plugins: { title: { display: true, text: "Grafik Pemasukan vs Pengeluaran" }, legend: { position: "bottom" } }
                }
            });
        });
    }

    function simpan(){
        let sheet=document.getElementById("sheet").value;
        let form=new FormData();
        form.append("sheet",sheet);
        form.append("tanggal",document.getElementById("tanggal").value);
        form.append("keterangan",document.getElementById("ket").value);
        form.append("masuk",document.getElementById("masuk").value);
        form.append("keluar",document.getElementById("keluar").value);
        form.append("bukti",document.getElementById("bukti").value);

        fetch(API,{method:"POST",body:form})
        .then(r=>r.text())
        .then(res=>{ alert("Data tersimpan"); loadData(); });
    }

    // --- FUNGSI CETAK PDF (VERSI PALING LENGKAP) ---
    function cetakPDF(){
        const { jsPDF } = window.jspdf;
        let doc=new jsPDF();
        
        let kas=document.getElementById("sheet").selectedOptions[0].text;
        
        // Logika Periode
        let bulanTxt = document.getElementById("filterBulan").selectedOptions[0].text;
        let tahunTxt = document.getElementById("filterTahun").selectedOptions[0].text;
        let triwulanTxt = document.getElementById("filterTriwulan").selectedOptions[0].text;
        
        let periode = "Semua Data";
        if(bulanTxt !== "Semua Bulan") {
            periode = bulanTxt + " " + tahunTxt;
        } else if(triwulanTxt !== "Semua Triwulan") {
            periode = triwulanTxt + " " + tahunTxt;
        } else if(tahunTxt !== "Semua Tahun" && tahunTxt !== "Tahun") {
            periode = "Tahun " + tahunTxt;
        }

        doc.setFontSize(18);
        doc.text("LAPORAN KAS RT 07",105,20,{align:"center"});
        doc.setFontSize(11);
        doc.text("Perumahan Bumi Indah City",105,27,{align:"center"});
        
        doc.text("Jenis Kas : "+kas,14,40);
        doc.text("Periode : "+periode,14,46);
        doc.text("Tanggal Cetak : "+new Date().toLocaleDateString("id-ID"),14,52);

        let rows=[]; let totalMasuk=0; let totalKeluar=0;
        document.querySelectorAll("#tabel tr").forEach(tr=>{
            let td=tr.querySelectorAll("td"); if(td.length<6) return;
            totalMasuk+=Number(td[2].innerText.replace(/[^0-9]/g,""));
            totalKeluar+=Number(td[3].innerText.replace(/[^0-9]/g,""));
            rows.push([td[0].innerText, td[1].innerText, td[2].innerText, td[3].innerText, td[5].innerText]);
        });

        doc.autoTable({
            startY:60,
            head:[["Tanggal","Keterangan","Masuk","Keluar","Saldo"]],
            body:rows,
            headStyles:{fillColor:[47,128,237]},
            columnStyles:{2:{halign:"right"},3:{halign:"right"},4:{halign:"right"}}
        });

        let y = doc.lastAutoTable.finalY + 10;
        doc.text("Total Pemasukan : Rp "+totalMasuk.toLocaleString("id-ID"), 14, y);
        doc.text("Total Pengeluaran : Rp "+totalKeluar.toLocaleString("id-ID"), 14, y+6);
        doc.text("Saldo Akhir : Rp "+(totalMasuk-totalKeluar).toLocaleString("id-ID"), 14, y+12);

        // TANDA TANGAN (TANGERANG & PENGURUS)
        let ttdY = y + 30;
        let pageWidth = doc.internal.pageSize.getWidth();
        doc.text("Tangerang, "+new Date().toLocaleDateString("id-ID"), pageWidth-14, ttdY, {align:"right"});
        
        doc.text("Mengetahui,", 14, ttdY+10);
        doc.text("Ketua RT 07", 14, ttdY+20);
        doc.text("(Muhammad Zainudin)", 14, ttdY+40);
        
        doc.text("Bendahara RT 07", pageWidth-14, ttdY+20, {align:"right"});
        doc.text("(Abdul Goni)", pageWidth-14, ttdY+40, {align:"right"});

        doc.save("Laporan_Kas_RT07.pdf");
    }

    loadData();
    setInterval(loadData,5000);
</script>

</body>
</html>
