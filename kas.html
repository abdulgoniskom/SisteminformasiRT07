<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kas RT 07</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* Style tetap sama seperti sebelumnya */
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background:#f4f7fa; display:flex; }
        .sidebar { width:220px; background:#2c3e50; height:100vh; color:white; position:fixed; transition: 0.3s; z-index: 1000; left: 0; }
        .sidebar.closed { left: -220px; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid #3e4f5f; font-size:16px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover, .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; }
        .main { margin-left:220px; width:100%; transition: 0.3s; min-height: 100vh; }
        .main.expanded { margin-left: 0; }
        header { background:#2f80ed; color:white; padding:15px; display:flex; justify-content:space-between; align-items: center; position: sticky; top: 0; z-index: 999; }
        .container { padding:20px; max-width:1150px; margin:auto; }
        .card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .flex-box { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-box > div { flex: 1; min-width: 150px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold; color:white; }
        .btn-green { background:#27ae60; } .btn-blue { background:#2f80ed; } .btn-orange { background:#f39c12; }
        table { width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; background: white; }
        th { background:#f8f9fa; padding:12px; border-bottom:2px solid #eee; text-align:center; }
        td { padding:12px; border-bottom:1px solid #eee; text-align:center; }
        .btn-view { color:#2f80ed; text-decoration:none; font-size:11px; border:1px solid #ddd; padding:2px 5px; border-radius:3px; background:#f0f0f0; }
        @media (max-width: 768px) { .sidebar { left:-220px; } .sidebar.open { left:0; } .main { margin-left:0; } }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html" class="active">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main" id="mainContent">
    <header>
        <div style="display:flex; align-items:center;">
            <div onclick="toggleSidebar()" style="font-size:24px; cursor:pointer; margin-right:15px;">☰</div>
            <h2 style="font-size:16px;">Sistem Kas RT 07</h2>
        </div>
        <button id="loginBtn" class="btn-blue" onclick="adminLogin()">Login Admin</button>
    </header>

    <div class="container">
        <div class="card" style="border-left: 5px solid #2f80ed;">
            <label>Saldo Akhir Saat Ini</label>
            <h2 id="saldoDisplay">Rp 0</h2>
        </div>

        <div class="card">
            <div class="flex-box">
                <div>
                    <label>Jenis Kas:</label>
                    <select id="sheet" onchange="loadData()">
                        <option value="Kas_RT">Kas RT</option>
                        <option value="Kas_Agustusan">Kas Agustusan</option>
                    </select>
                </div>
       <div>
       <label>Filter Tahun:</label>
        <select id="filterTahun" onchange="loadData()">
        <option value="all" selected>-- Semua Tahun --</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
    </select>
</div>
                <div>
                    <label>Filter Bulan:</label>
                    <select id="filterBulan" onchange="loadData()">
                        <option value="all">-- Semua Bulan --</option>
                        <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                        <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                        <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                        <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                    </select>
                </div>
            </div>
            <button onclick="cetakPDF()" class="btn-green" style="width:100%; margin-top:15px;">🧾 Cetak Laporan PDF</button>
        </div>

        <div class="card" style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>TANGGAL</th>
                        <th>KETERANGAN</th>
                        <th>MASUK</th>
                        <th>KELUAR</th>
                        <th>BUKTI</th>
                        <th>SALDO</th>
                        <th id="thAksi" style="display:none">AKSI</th>
                    </tr>
                </thead>
                <tbody id="bodiTabel"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwJN4E7kyKVV72vHTU8vGSnRDpsqAzyLXzTtGZATA8T8dtUQhzyNaxXjb7Bp9kKOX4/exec"; // WAJIB DIISI
    let masterData = [];
    let isAdmin = false;

    // FIX SIDEBAR TIDAK BISA DIKLIK
    function toggleSidebar() {
        const s = document.getElementById("mySidebar");
        const m = document.getElementById("mainContent");
        if (window.innerWidth > 768) {
            s.classList.toggle("closed");
            m.classList.toggle("expanded");
        } else {
            s.classList.toggle("open");
        }
    }

    function loadData() {
        const s = document.getElementById("sheet").value;
        const fB = document.getElementById("filterBulan").value;
        const fT = document.getElementById("filterTahun").value;
        const bodi = document.getElementById("bodiTabel");
        
        bodi.innerHTML = '<tr><td colspan="7">Memuat data...</td></tr>';

        fetch(`${API_URL}?sheet=${s}`).then(r => r.json()).then(data => {
            masterData = data;
            let html = ""; 
            let sJalan = 0; // Kunci Saldo Pindahan Kumulatif

    data.forEach(d => {
    let m = Number(d.masuk) || 0;
    let k = Number(d.keluar) || 0;
    sJalan += (m - k); 

    const matchTahun = (fT === "all") || (String(d.tahun_laporan) === fT);
    const matchBulan = (fB === "all") || (String(d.bulan_laporan) === fB);

    if (matchTahun && matchBulan) {
        // Logika agar Rp 0 tampil sebagai "-"
        const tampilMasuk = m > 0 ? `Rp ${m.toLocaleString()}` : "-";
        const tampilKeluar = k > 0 ? `Rp ${k.toLocaleString()}` : "-";

        html += `<tr>
            <td>${new Date(d.tanggal).toLocaleDateString("id-ID")}</td>
            <td style="text-align:left">${d.keterangan}</td>
            <td style="color:#27ae60; font-weight:bold">${tampilMasuk}</td>
            <td style="color:#e74c3c; font-weight:bold">${tampilKeluar}</td>
            <td>${d.bukti ? `<a href="${d.bukti}" target="_blank" class="btn-view">Lihat</a>` : '-'}</td>
            <td style="font-weight:bold">Rp ${sJalan.toLocaleString()}</td>
            <td class="admin-only" style="${isAdmin ? '' : 'display:none'}">
                <button onclick="editData(${d.row_id})" class="btn-orange" style="padding:4px 8px; font-size:10px;">EDIT</button>
            </td>
        </tr>`;
    }
});
    function cetakPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    
    const fB = document.getElementById("filterBulan");
    const fT = document.getElementById("filterTahun");
    const pilihBulan = fB.value;
    const pilihTahun = fT.value;
    
    const namaBulan = fB.options[fB.selectedIndex].text;
    const namaTahun = fT.options[fT.selectedIndex].text;
    const jenisKas = document.getElementById("sheet").value.replace('_', ' ');

    // Header Laporan
    doc.setFontSize(16);
    doc.text(`LAPORAN ${jenisKas.toUpperCase()} RT 07 RW 09`, 105, 15, { align: "center" });
    doc.setFontSize(12);
    doc.text("Perumahan Bumi Indah Citty", 105, 22, { align: "center" });
    
    doc.setFontSize(11);
    doc.text(`Jenis Kas : ${jenisKas.replace('Kas ', '')}`, 15, 35);
    doc.text(`Periode   : ${namaBulan} ${namaTahun}`, 15, 41);
    doc.text(`Tanggal Cetak : ${new Date().toLocaleDateString("id-ID")}`, 15, 47);

    let rows = [];
    let saldoPindahan = 0;
    let totalMasuk = 0;
    let totalKeluar = 0;

    // Hitung Saldo Pindahan (Semua transaksi SEBELUM periode filter)
    masterData.forEach(d => {
        const m = Number(d.masuk) || 0;
        const k = Number(d.keluar) || 0;
        
        const tglData = new Date(d.tanggal);
        const blnData = d.bulan_laporan;
        const thnData = d.tahun_laporan;

        // Jika filter bukan "Semua", hitung saldo pindahan
        if (pilihBulan !== "all" || pilihTahun !== "all") {
            // Logika: Jika tahun data < tahun pilih ATAU (tahun sama DAN bulan data < bulan pilih)
            if (thnData < pilihTahun || (thnData == pilihTahun && blnData < pilihBulan)) {
                saldoPindahan += (m - k);
            }
        }
    });

    // Tambahkan Baris Saldo Pindahan di awal jika ada
    if (pilihBulan !== "all" || pilihTahun !== "all") {
        rows.push([
            "", 
            "Saldo Pindahan Bulan Lalu", 
            "-", 
            "-", 
            `Rp ${saldoPindahan.toLocaleString()}`
        ]);
    }

    let saldoJalan = saldoPindahan;

    // Tambahkan Data Transaksi yang Sesuai Filter
    masterData.forEach(d => {
        const m = Number(d.masuk) || 0;
        const k = Number(d.keluar) || 0;
        
        const matchTahun = (pilihTahun === "all") || (String(d.tahun_laporan) === pilihTahun);
        const matchBulan = (pilihBulan === "all") || (String(d.bulan_laporan) === pilihBulan);

        if (matchTahun && matchBulan) {
            saldoJalan += (m - k);
            totalMasuk += m;
            totalKeluar += k;
            rows.push([
                new Date(d.tanggal).toLocaleDateString("id-ID"),
                d.keterangan,
                m > 0 ? `Rp ${m.toLocaleString()}` : "-",
                k > 0 ? `Rp ${k.toLocaleString()}` : "-",
                `Rp ${saldoJalan.toLocaleString()}`
            ]);
        }
    });

    // Buat Tabel
    doc.autoTable({
        head: [['Tanggal', 'Keterangan', 'Masuk', 'Keluar', 'Saldo']],
        body: rows,
        startY: 55,
        theme: 'grid',
        headStyles: { fillBlue: [47, 128, 237], halign: 'center' },
        columnStyles: {
            2: { halign: 'right' },
            3: { halign: 'right' },
            4: { halign: 'right' }
        }
    });

    // Ringkasan di bawah tabel
    let finalY = doc.lastAutoTable.finalY + 10;
    doc.setFontSize(10);
    doc.text(`Total Pemasukan : Rp ${totalMasuk.toLocaleString()}`, 15, finalY);
    doc.text(`Total Pengeluaran : Rp ${totalKeluar.toLocaleString()}`, 15, finalY + 6);
    doc.setFont(undefined, 'bold');
    doc.text(`Saldo Akhir : Rp ${saldoJalan.toLocaleString()}`, 15, finalY + 12);
    doc.setFont(undefined, 'normal');

    // Tanda Tangan
    let ttdY = finalY + 25;
    doc.text(`Tangerang, ${new Date().toLocaleDateString("id-ID")}`, 150, ttdY);
    doc.text("Mengetahui,", 15, ttdY + 10);
    doc.text("Ketua RT 07", 15, ttdY + 20);
    doc.text("Bendahara RT 07", 150, ttdY + 20);
    
    doc.text("( Muhammad Zainudin )", 15, ttdY + 45);
    doc.text("( Abdul Goni )", 150, ttdY + 45);

    doc.save(`Laporan_Kas_${namaBulan}_${namaTahun}.pdf`);
}
    function adminLogin() {
        if(prompt("Password Admin:") === "Bumiindah07") {
            isAdmin = true;
            document.getElementById("thAksi").style.display = "";
            loadData();
        }
    }

    loadData();
</script>
</body>
</html>
