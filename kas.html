<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kas RT 07</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background:#f4f7fa; display:flex; }
        .sidebar { width:220px; background:#2c3e50; height:100vh; color:white; position:fixed; transition: 0.3s; z-index: 1000; left: 0; }
        .sidebar.closed { left: -220px; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid #3e4f5f; font-size:16px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover, .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; }
        .main { margin-left:220px; width:100%; transition: 0.3s; }
        .main.expanded { margin-left: 0; }
        header { background:#2f80ed; color:white; padding:15px; display:flex; justify-content:space-between; align-items: center; position: sticky; top: 0; z-index: 999; }
        .container { padding:20px; max-width:1150px; margin:auto; }
        .card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .flex-box { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-box > div { flex: 1; min-width: 150px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold; color:white; }
        .btn-blue { background:#2f80ed; } .btn-green { background:#27ae60; } .btn-red { background:#e74c3c; } .btn-orange { background:#f39c12; }
        table { width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; }
        th { background:#f8f9fa; padding:12px; border-bottom:2px solid #eee; text-align:center; }
        td { padding:12px; border-bottom:1px solid #eee; text-align:center; }
        .masuk { color:#27ae60; font-weight:bold; }
        .keluar { color:#e74c3c; font-weight:bold; }
        @media (max-width: 768px) { .sidebar { left:-220px; } .sidebar.open { left:0; } .main { margin-left:0; } }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html" class="active">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main" id="mainContent">
    <header>
        <div style="display:flex; align-items:center;">
            <div onclick="toggleSidebar()" style="font-size:24px; cursor:pointer; margin-right:15px;">☰</div>
            <h2 style="font-size:16px;">Sistem Kas RT 07</h2>
        </div>
        <button id="loginBtn" class="btn-blue">Login Admin</button>
    </header>

    <div class="container">
        <div class="card" style="border-left: 5px solid #2f80ed;">
            <label>Saldo Akhir Saat Ini</label>
            <h2 id="saldoDisplay">Rp 0</h2>
        </div>

        <div class="card">
            <div class="flex-box">
                <div>
                    <label>Jenis Kas:</label>
                    <select id="sheet" onchange="loadData()"><option value="Kas_RT">Kas RT</option><option value="Kas_Agustusan">Kas Agustusan</option></select>
                </div>
                <div>
                    <label>Tahun:</label>
                    <select id="filterTahun" onchange="loadData()"><option value="2025">2025</option><option value="2026" selected>2026</option></select>
                </div>
                <div>
    <label>Bulan:</label>
    <select id="filterBulan" onchange="loadData()">
        <option value="all">-- Semua Bulan --</option>
        <option value="1">Januari</option>
        <option value="2">Februari</option>
        <option value="3">Maret</option>
        <option value="4">April</option>
        <option value="5">Mei</option>
        <option value="6">Juni</option>
        <option value="7">Juli</option>
        <option value="8">Agustus</option>
        <option value="9">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
    </select>
</div>
            </div>
            <button onclick="cetakPDF()" class="btn-green" style="width:100%; margin-top:15px;">🧾 Cetak Laporan PDF</button>

            <div id="formAdmin" class="card" style="display:none; margin-top:20px; border:1px dashed #2f80ed;">
                <h3 id="judulForm">TAMBAH TRANSAKSI</h3>
                <input type="hidden" id="editRowId">
                <div class="flex-box" style="margin-top:10px;">
                    <div><label>Tgl Kalender:</label><input type="date" id="tgl" onchange="updateBulanLaporan()"></div>
                    <div><label>Bulan Laporan:</label><select id="inBln"><option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option><option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option></select></div>
                    <div><label>Tahun Laporan:</label><input type="number" id="inThn" value="2026"></div>
                </div>
                <div style="margin-top:10px;"><label>Keterangan:</label><input type="text" id="keterangan" placeholder="Contoh: Iuran Kas..."></div>
                <div class="flex-box" style="margin-top:10px;">
                    <div><label>Masuk (Rp):</label><input type="number" id="inMasuk" value="0"></div>
                    <div><label>Keluar (Rp):</label><input type="number" id="inKeluar" value="0"></div>
                    <div><label>Link Bukti (Drive/ImgBB):</label><input type="text" id="inBukti" placeholder="https://..."></div>
                </div>
                <button id="btnSimpan" class="btn-blue" onclick="prosesSimpan()" style="width:100%; margin-top:15px;">SIMPAN DATA</button>
                <button id="btnBatal" onclick="resetForm()" style="background:#95a5a6; width:100%; margin-top:5px; display:none;">BATAL EDIT</button>
            </div>
        </div>

        <div class="card" style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>TANGGAL</th>
                        <th>KETERANGAN</th>
                        <th>MASUK</th>
                        <th>KELUAR</th>
                        <th>BUKTI</th>
                        <th>SALDO</th>
                        <th class="admin-only" style="display:none">AKSI</th>
                    </tr>
                </thead>
                <tbody id="bodiTabel"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwJN4E7kyKVV72vHTU8vGSnRDpsqAzyLXzTtGZATA8T8dtUQhzyNaxXjb7Bp9kKOX4/exec"; 
    let masterData = [];
    let isAdmin = false;

    function toggleSidebar() {
        const s = document.getElementById("mySidebar");
        window.innerWidth > 768 ? s.classList.toggle("closed") : s.classList.toggle("open");
    }

    function updateBulanLaporan() {
        const d = new Date(document.getElementById("tgl").value);
        let m = d.getMonth() + 1; let y = d.getFullYear();
        if (d.getDate() <= 10) { m -= 1; if (m === 0) { m = 12; y -= 1; } }
        document.getElementById("inBln").value = m;
        document.getElementById("inThn").value = y;
    }

    function loadData() {
        const s = document.getElementById("sheet").value;
        const fB = document.getElementById("filterBulan").value;
        const fT = document.getElementById("filterTahun").value;
        fetch(`${API_URL}?sheet=${s}`).then(r => r.json()).then(data => {
            masterData = data;
            let html = ""; let sJalan = 0;
            data.forEach(d => {
                let m = Number(d.masuk)||0; let k = Number(d.keluar)||0;
                sJalan += (m - k);
                if (String(d.tahun_laporan) === fT && (fB === "all" || String(d.bulan_laporan) === fB)) {
                    html += `<tr>
                        <td>${new Date(d.tanggal).toLocaleDateString("id-ID")}</td>
                        <td style="text-align:left">${d.keterangan}</td>
                        <td class="masuk">${m.toLocaleString()}</td>
                        <td class="keluar">${k.toLocaleString()}</td>
                        <td>${d.bukti ? `<a href="${d.bukti}" target="_blank">View</a>` : '-'}</td>
                        <td style="font-weight:bold">${sJalan.toLocaleString()}</td>
                        <td class="admin-only" style="${isAdmin ? '' : 'display:none'}">
                            <button onclick="editData(${d.row_id})" class="btn-orange" style="padding:4px 8px; font-size:10px;">EDIT</button>
                            <button onclick="hapusData(${d.row_id})" class="btn-red" style="padding:4px 8px; font-size:10px;">HAPUS</button>
                        </td>
                    </tr>`;
                }
            });
            document.getElementById("bodiTabel").innerHTML = html || '<tr><td colspan="7">Data Kosong</td></tr>';
            document.getElementById("saldoDisplay").innerText = "Rp " + sJalan.toLocaleString();
        });
    }

    async function prosesSimpan() {
        const rowId = document.getElementById("editRowId").value;
        const p = {
            action: rowId ? "update_kas" : "insert_kas",
            row_id: rowId, sheet: document.getElementById("sheet").value,
            tanggal: document.getElementById("tgl").value, keterangan: document.getElementById("keterangan").value,
            masuk: document.getElementById("inMasuk").value, keluar: document.getElementById("inKeluar").value,
            bukti: document.getElementById("inBukti").value,
            bulan_laporan: document.getElementById("inBln").value, tahun_laporan: document.getElementById("inThn").value
        };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(p) });
        alert("Berhasil!"); resetForm(); loadData();
    }

    function editData(rowId) {
        const d = masterData.find(i => i.row_id === rowId);
        document.getElementById("editRowId").value = d.row_id;
        document.getElementById("tgl").value = new Date(d.tanggal).toISOString().split('T')[0];
        document.getElementById("keterangan").value = d.keterangan;
        document.getElementById("inMasuk").value = d.masuk;
        document.getElementById("inKeluar").value = d.keluar;
        document.getElementById("inBukti").value = d.bukti || "";
        document.getElementById("inBln").value = d.bulan_laporan;
        document.getElementById("inThn").value = d.tahun_laporan;
        document.getElementById("judulForm").innerText = "EDIT DATA ROW " + rowId;
        document.getElementById("btnBatal").style.display = "block";
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById("editRowId").value = "";
        document.getElementById("judulForm").innerText = "TAMBAH TRANSAKSI";
        document.getElementById("btnBatal").style.display = "none";
        document.querySelectorAll("#formAdmin input").forEach(i => i.value = "");
    }

    document.getElementById("loginBtn").onclick = () => {
        if(prompt("Pass:") === "Bumiindah07") {
            isAdmin = true;
            document.getElementById("formAdmin").style.display = "block";
            document.querySelectorAll(".admin-only").forEach(el => el.style.display = "");
            loadData();
        }
    };

    loadData();
</script>
</body>
</html>
