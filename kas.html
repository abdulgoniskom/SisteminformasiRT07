<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas RT 07 - Admin & View</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background:#eef2f7; display:flex; }
        .sidebar { width:220px; background:#2c3e50; height:100vh; color:white; position:fixed; transition: 0.3s; z-index: 1000; left: 0; }
        .sidebar.closed { left: -220px; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid #3e4f5f; font-size:16px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover, .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; }
        .main { margin-left:220px; width:100%; transition: 0.3s; }
        .main.expanded { margin-left: 0; }
        header { background:#2f80ed; color:white; padding:15px; display:flex; justify-content:space-between; align-items: center; sticky; top: 0; }
        .container { padding:20px; max-width:1100px; margin:auto; }
        .card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        button { background:#2f80ed; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { border-bottom:1px solid #ddd; padding:12px; text-align:center; font-size:13px; }
        th { background:#f8f9fa; }
        .masuk { color:#27ae60; font-weight:bold; }
        .keluar { color:#e74c3c; font-weight:bold; }
        .formInput { display:none; border-top: 2px dashed #ddd; margin-top:20px; padding-top:20px; }
        @media (max-width: 768px) { .sidebar { left:-220px; } .sidebar.open { left:0; } .main { margin-left:0; } }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html" class="active">Kas RT</a>
    <a href="warga.html">Data Warga</a>
</div>

<div class="main" id="mainContent">
    <header>
        <div style="display:flex; align-items:center;">
            <div onclick="toggleSidebar()" style="font-size:24px; cursor:pointer; margin-right:15px;">☰</div>
            <h2 style="font-size:16px;">Sistem Kas RT 07</h2>
        </div>
        <div>
            <button id="loginBtn">Login Admin</button>
            <button id="logoutBtn" style="display:none; background:#e74c3c">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="sheet" onchange="loadData()"><option value="Kas_RT">Kas RT</option><option value="Kas_Agustusan">Kas Agustusan</option></select>
                <select id="filterBulan" onchange="loadData()">
                    <option value="1">Januari</option><option value="2">Februari</option><option value="3" selected>Maret</option>
                    <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                    <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                    <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                </select>
            </div>
            <h2 id="saldoDisplay" style="margin-top:15px; color:#2f80ed;">Saldo: Rp 0</h2>
            <button onclick="cetakPDF()" style="background:#27ae60; width:100%; margin-top:10px;">🧾 Cetak PDF</button>

            <div class="formInput" id="formInput">
                <h3>Input Transaksi</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <input type="date" id="tanggal" onchange="autoSetPeriode()">
                    <input type="text" id="ket" placeholder="Keterangan">
                    <input type="number" id="masuk" placeholder="Masuk">
                    <input type="number" id="keluar" placeholder="Keluar">
                    <select id="inBln"><option value="1">Jan</option><option value="2">Feb</option><option value="12">Des</option></select>
                    <input type="number" id="inThn" value="2026">
                </div>
                <button onclick="simpan()" style="width:100%; margin-top:10px; background:#1abc9c;">Simpan Data</button>
            </div>
        </div>

        <div class="card" style="overflow-x:auto;">
            <table>
                <thead><tr><th>Tgl</th><th>Keterangan</th><th>Masuk</th><th>Keluar</th><th>Saldo</th></tr></thead>
                <tbody id="tabel"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyKOszbxBVTh8CdBdgkKKDHq8V8rNFEFEcWCDq3ojisdOn4ATYMuX760_OVVWczbSA/exec"; // GANTI DENGAN URL WEB APP ANDA
    let masterData = [];

    function toggleSidebar() {
        const s = document.getElementById("mySidebar");
        window.innerWidth > 768 ? s.classList.toggle("closed") : s.classList.toggle("open");
    }

    function autoSetPeriode() {
        const d = new Date(document.getElementById("tanggal").value);
        let m = d.getMonth(); let y = d.getFullYear();
        if (m === 0) { document.getElementById("inBln").value = "12"; document.getElementById("inThn").value = y - 1; }
        else { document.getElementById("inBln").value = m; document.getElementById("inThn").value = y; }
    }

    function loadData() {
        const s = document.getElementById("sheet").value;
        const fB = document.getElementById("filterBulan").value;
        fetch(`${API_URL}?sheet=${s}`).then(r => r.json()).then(data => {
            masterData = data;
            let html = ""; let sJalan = 0;
            data.forEach(d => {
                let m = Number(d.masuk)||0; let k = Number(d.keluar)||0;
                sJalan += (m - k);
                if (String(d.bulan_laporan) === String(fB)) {
                    html += `<tr><td>${new Date(d.tanggal).toLocaleDateString("id-ID")}</td><td>${d.keterangan}</td><td class="masuk">${m}</td><td class="keluar">${k}</td><td>${sJalan}</td></tr>`;
                }
            });
            document.getElementById("tabel").innerHTML = html;
            document.getElementById("saldoDisplay").innerText = "Saldo: Rp " + sJalan.toLocaleString();
        });
    }

    async function simpan() {
        const p = {
            action: "insert_kas", sheet: document.getElementById("sheet").value,
            tanggal: document.getElementById("tanggal").value, keterangan: document.getElementById("ket").value,
            masuk: document.getElementById("masuk").value, keluar: document.getElementById("keluar").value,
            bulan_laporan: document.getElementById("inBln").value, tahun_laporan: document.getElementById("inThn").value
        };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(p) });
        alert("Berhasil!"); location.reload();
    }

    document.getElementById("loginBtn").onclick = () => {
        if(prompt("Pass:") === "Bumiindah07") {
            document.getElementById("formInput").style.display="block";
            document.getElementById("loginBtn").style.display="none";
            document.getElementById("logoutBtn").style.display="inline";
        }
    };

    function cetakPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("LAPORAN KAS RT 07", 105, 15, { align: "center" });
        let rows = []; 
        document.querySelectorAll("#tabel tr").forEach(tr => {
            let td = tr.querySelectorAll("td");
            rows.push([td[0].innerText, td[1].innerText, td[2].innerText, td[3].innerText, td[4].innerText]);
        });
        doc.autoTable({ head: [['Tgl', 'Ket', 'Masuk', 'Keluar', 'Saldo']], body: rows, startY: 25 });
        let finalY = doc.lastAutoTable.finalY + 20;
        doc.text("Ketua RT 07", 40, finalY); doc.text("Bendahara", 150, finalY);
        doc.text("( Muhammad Zainudin )", 40, finalY+25); doc.text("( Abdul Goni )", 150, finalY+25);
        doc.save("Laporan_Kas.pdf");
    }

    loadData();
</script>
</body>
</html>
