<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi RT 07</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2f80ed;
            --success: #27ae60;
            --danger: #eb5757;
            --warning: #f2994a;
            --dark: #2c3e50;
            --bg: #f8fbff;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: var(--bg); display:flex; overflow-x: hidden; color: var(--dark); }
        
        /* SIDEBAR ELEGAN */
        .sidebar { width:240px; background: var(--dark); height:100vh; color:white; position:fixed; z-index: 1000; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .sidebar h2 { text-align:center; padding:30px 20px; font-size: 20px; font-weight: 800; letter-spacing: 1px; color: #1abc9c; }
        .sidebar a { display:block; color:rgba(255,255,255,0.6); padding:15px 25px; text-decoration:none; font-size: 14px; transition: 0.3s; border-radius: 0 25px 25px 0; margin-right: 20px; }
        .sidebar a:hover, .sidebar a.active { background: rgba(26, 188, 156, 0.1); color: #1abc9c; font-weight: 600; border-left: 4px solid #1abc9c; }
        
        .main { margin-left:240px; width:calc(100% - 240px); min-height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER */
        header { 
            background:white; padding:20px 40px; display:flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
        }
        header h2 { font-size: 18px; font-weight: 700; color: var(--dark); }
        .ketua-rt { font-size: 11px; font-weight: 700; color: var(--primary); background: #eef5ff; padding: 8px 15px; border-radius: 30px; border: 1px solid #d0e3ff; }

        /* RUNNING TEXT LUXURY */
        .running-text-wrapper { 
            background: linear-gradient(90deg, var(--warning), #e67e22); 
            color: white; padding: 12px 0; font-weight: 500; font-size: 13px; overflow: hidden;
        }
        #marqueeKonten {
            display: inline-block; white-space: nowrap; padding-left: 100%;
            animation: jalan-terus 25s linear infinite; -webkit-animation: jalan-terus 25s linear infinite;
        }
        @keyframes jalan-terus { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @-webkit-keyframes jalan-terus { 0% { -webkit-transform: translateX(0); } 100% { -webkit-transform: translateX(-100%); } }
        
        /* MODERN CARDS SYSTEM */
        .container { padding:30px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .card { 
            padding: 25px; border-radius: 20px; color: white; position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.4s; border: 1px solid rgba(255,255,255,0.1);
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); }
        
        /* Background Card Luxury */
        .card:nth-child(1){ background: linear-gradient(135deg, #2f80ed, #56ccf2); }
        .card:nth-child(2){ background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .card:nth-child(3){ background: linear-gradient(135deg, #eb5757, #ff7675); }
        .card:nth-child(4){ background: linear-gradient(135deg, #6c5ce7, #a29bfe); }

        .card h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 12px; opacity: 0.85; font-weight: 600; }
        .card p { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        
        /* Glass Decoration inside Card */
        .card::after {
            content: ""; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px;
            background: rgba(255,255,255,0.15); border-radius: 50%;
        }

        /* CHART BOX ELEGAN */
        .chart-box { 
            background: white; padding: 30px; border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #f0f0f0;
        }
        .chart-box h3 { font-size: 16px; margin-bottom: 20px; font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 10px; }
        .chart-box h3::before { content: ""; width: 4px; height: 18px; background: var(--primary); border-radius: 10px; }

        /* RESPONSIVE HP */
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar h2 { display: none; }
            .sidebar a { padding: 20px 0; text-align: center; border-radius: 0; margin-right: 0; }
            .main { margin-left: 70px; width: calc(100% - 70px); }
            header { padding: 15px 20px; flex-direction: column; gap: 8px; }
            header h2 { font-size: 14px; }
            .container { padding: 15px; }
            
            /* KOTAK ELEGAN DI HP (2 KOLOM) */
            .cards { grid-template-columns: 1fr 1fr; gap: 12px; }
            .card { 
                padding: 20px 10px; border-radius: 18px; aspect-ratio: 1/1; 
                display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            }
            .card h3 { font-size: 9px; margin-bottom: 6px; }
            .card p { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>RT 07</h2>
    <a href="#" class="active">Dashboard</a>
    <a href="#">Kas RT</a>
    <a href="#">Data Warga</a>
    <a href="#">Pengumuman</a>
    <a href="#">Kalender</a>
    <a href="#">Arsip</a>
</div>

<div class="main">
    <header>
        <h2>Dashboard Statistik RT 07</h2>
        <div class="ketua-rt">Ketua RT: Bpk. Muhammad Zainudin</div>
    </header>

    <div class="running-text-wrapper">
        <div id="marqueeKonten">📢 Menyambungkan ke sistem database RT...</div>
    </div>

    <div class="container">
        <div class="cards">
            <div class="card">
                <h3>Total Kas RT</h3>
                <p id="totalKasRT">Rp 0</p>
            </div>
            <div class="card">
                <h3>Kas Agustusan</h3>
                <p id="kasAgustusan">Rp 0</p>
            </div>
            <div class="card">
                <h3>Pengeluaran</h3>
                <p id="pengeluaranBulan">Rp 0</p>
            </div>
            <div class="card">
                <h3>Total Warga</h3>
                <p id="jumlahWargaDisplay">0 Orang</p>
            </div>
        </div>

        <div class="chart-box">
            <h3>Laporan Keuangan Bulanan</h3>
            <div style="height: 300px;"><canvas id="kasChart"></canvas></div>
        </div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxA1WFwM45lBSZMnEx87w53x8IVv-nOYUNRfaHZSuGLsuDgfIUlxhxq5UOqz7XafXk/exec";
const API_WARGA = "https://script.google.com/macros/s/AKfycbzxvpCt5-1f_9X-xxQYTt4XF7UutTvfVwhKOe89I4Iowb4BX5RZRqos1WMIXURSx1WR/exec";
const API_PENGUMUMAN = "https://script.google.com/macros/s/AKfycbx2PbPk0D5v2VBX0LsrFr8hKC-H2wz2IdqsQAQV5be5XMXVzLjcUNl1kg7lEXBq7XI/exec";

let chart;
const rupiah = (a) => "Rp " + Number(a).toLocaleString("id-ID");

async function init() {
    try {
        // Load Warga
        fetch(API_WARGA + "?sheet=Data_Warga").then(r => r.json()).then(d => {
            document.getElementById("jumlahWargaDisplay").innerText = d.length + " Orang";
        });

        // Load Kas
        fetch(API + "?sheet=Kas_RT").then(r => r.json()).then(d => {
            let m=0, k=0, kb=0, s=new Date();
            d.forEach(x => {
                let masuk=Number(x.masuk||0), keluar=Number(x.keluar||0);
                m+=masuk; k+=keluar;
                let t=new Date(x.tanggal);
                if(t.getMonth()===s.getMonth() && t.getFullYear()===s.getFullYear()) kb+=keluar;
            });
            document.getElementById("totalKasRT").innerText = rupiah(m-k);
            document.getElementById("pengeluaranBulan").innerText = rupiah(kb);
            drawChart(d);
        });

        // Load Agustusan
        fetch(API + "?sheet=Kas_Agustusan").then(r => r.json()).then(d => {
            let t=0; d.forEach(x => t += (Number(x.masuk||0) - Number(x.keluar||0)));
            document.getElementById("kasAgustusan").innerText = rupiah(t);
        });

        // Load Pengumuman
        fetch(API_PENGUMUMAN + "?sheet=Pengumuman").then(r => r.json()).then(d => {
            if(d && d.length > 0) {
                let teks = d.reverse().slice(0,3).map(x => x.judul).join(" &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ");
                document.getElementById("marqueeKonten").innerHTML = "📢 INFO: " + teks + " &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;";
            }
        });
    } catch(e) { console.log(e); }
}

function drawChart(data) {
    let bm = Array(12).fill(0), bk = Array(12).fill(0);
    data.forEach(x => {
        let t = new Date(x.tanggal);
        if(!isNaN(t)) { bm[t.getMonth()] += Number(x.masuk||0); bk[t.getMonth()] += Number(x.keluar||0); }
    });
    if(chart) chart.destroy();
    chart = new Chart(document.getElementById("kasChart"), {
        type: 'bar',
        data: {
            labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
            datasets: [
                { label: 'Masuk', data: bm, backgroundColor: '#2f80ed', borderRadius: 8 },
                { label: 'Keluar', data: bk, backgroundColor: '#eb5757', borderRadius: 8 }
            ]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'top', labels: { usePointStyle: true, font: { size: 11 } } } },
            scales: { y: { grid: { display: false } }, x: { grid: { display: false } } }
        }
    });
}

window.onload = init;
</script>
</body>
</html>
