<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sistem Informasi RT 07</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#f1f4f9; display:flex; }

        /* SIDEBAR */
        .sidebar { width:220px; background:#2c3e50; height:100vh; color:white; position:fixed; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; }
        .sidebar a:hover, .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; }

        /* MAIN CONTENT */
        .main { margin-left:220px; width:100%; }
        header { background:white; padding:15px 30px; box-shadow:0 2px 5px rgba(0,0,0,0.1); display:flex; justify-content:space-between; align-items: center; }
        .container { padding:30px; }

        /* CARDS - Diperbaiki agar rapi seperti gambar */
        .cards { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .card { flex:1; min-width:200px; padding:20px; border-radius:10px; color:white; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        .card:nth-child(1){background:#2f80ed;}
        .card:nth-child(2){background:#27ae60;}
        .card:nth-child(3){background:#eb5757;}
        .card:nth-child(4){background:#f2994a;}
        .card h3 { font-size:14px; margin-bottom:10px; opacity: 0.9; }
        .card p { font-size:24px; font-weight:bold; }

        /* CHART & CALENDAR */
        .chart-box { background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        .mini-calendar { background:white; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); margin-top:30px; }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-top: 10px;}
        .day { background:#f7f9fc; padding:8px; border-radius:5px; font-size:12px; text-align:center; }
        .today { background: #2f80ed; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html" class="active">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main">
    <header>
        <h2>Sistem Informasi RT 07 RW 09 Bumi Indah City</h2>
        <div style="font-size: 14px; font-weight: bold;">Ketua RT : Bapak Muhammad Zainudin</div>
    </header>

    <div class="container">
        <div class="cards">
            <div class="card">
                <h3>Total Kas RT</h3>
                <p id="totalKasRT">Rp 0</p>
            </div>
            <div class="card">
                <h3>Kas Agustusan</h3>
                <p id="kasAgustusan">Rp 0</p>
            </div>
            <div class="card">
                <h3>Pengeluaran Bulan Ini</h3>
                <p id="pengeluaranBulan">Rp 0</p>
            </div>
            <div class="card">
                <h3>Jumlah Warga</h3>
                <p id="jumlahWargaDisplay">Memuat...</p>
            </div>
        </div>

        <div class="chart-box">
            <h3>Grafik Kas RT</h3>
            <canvas id="kasChart" style="max-height: 300px;"></canvas>
            
            <div class="mini-calendar">
                <h3>Kegiatan Warga Bulan Ini</h3>
                <div class="calendar-grid" id="miniCalendar"></div>
            </div>
        </div>
    </div>
</div>

<script>
// API URL Utama Anda
const API = "https://script.google.com/macros/s/AKfycbxA1WFwM45lBSZMnEx87w53x8IVv-nOYUNRfaHZSuGLsuDgfIUlxhxq5UOqz7XafXk/exec";
let chart;

function rupiah(angka) {
    return "Rp " + Number(angka).toLocaleString("id-ID");
}

/* 1. LOAD JUMLAH WARGA (Dinamis dari Sheet Data_Warga) */
function loadWargaCount() {
    fetch(API + "?sheet=Data Warga RT07")
        .then(res => res.json())
        .then(data => {
            document.getElementById("jumlahWargaDisplay").innerText = data.length + " Orang";
        })
        .catch(err => {
            document.getElementById("jumlahWargaDisplay").innerText = "Error";
        });
}

/* 2. TOTAL KAS RT */
function loadKasRT() {
    fetch(API + "?sheet=Kas_RT")
        .then(res => res.json())
        .then(data => {
            let masuk = 0, keluar = 0;
            data.forEach(d => {
                masuk += Number(d.masuk || 0);
                keluar += Number(d.keluar || 0);
            });
            document.getElementById("totalKasRT").innerText = rupiah(masuk - keluar);
        });
}

/* 3. KAS AGUSTUSAN */
function loadKasAgustusan() {
    fetch(API + "?sheet=Kas_Agustusan")
        .then(res => res.json())
        .then(data => {
            let masuk = 0, keluar = 0;
            data.forEach(d => {
                masuk += Number(d.masuk || 0);
                keluar += Number(d.keluar || 0);
            });
            document.getElementById("kasAgustusan").innerText = rupiah(masuk - keluar);
        });
}

/* 4. PENGELUARAN BULAN INI */
function loadPengeluaranBulan() {
    fetch(API + "?sheet=Kas_RT")
        .then(res => res.json())
        .then(data => {
            let bulanIni = new Date().getMonth();
            let tahunIni = new Date().getFullYear();
            let total = 0;
            data.forEach(d => {
                let tgl = new Date(d.tanggal);
                if(tgl.getMonth() == bulanIni && tgl.getFullYear() == tahunIni) {
                    total += Number(d.keluar || 0);
                }
            });
            document.getElementById("pengeluaranBulan").innerText = rupiah(total);
        });
}

/* 5. GRAFIK DASHBOARD */
function loadGrafikDashboard() {
    fetch(API + "?sheet=Kas_RT")
        .then(res => res.json())
        .then(data => {
            let bulanMasuk = Array(12).fill(0);
            let bulanKeluar = Array(12).fill(0);

            data.forEach(d => {
                let tgl = new Date(d.tanggal);
                let bulan = tgl.getMonth();
                bulanMasuk[bulan] += Number(d.masuk || 0);
                bulanKeluar[bulan] += Number(d.keluar || 0);
            });

            if(chart) chart.destroy();
            chart = new Chart(document.getElementById("kasChart"), {
                type: 'bar',
                data: {
                    labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
                    datasets: [
                        { label: 'Pemasukan', data: bulanMasuk, backgroundColor: '#2f80ed' },
                        { label: 'Pengeluaran', data: bulanKeluar, backgroundColor: '#eb5757' }
                    ]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        });
}

/* 6. MINI KALENDER */
function loadMiniCalendar() {
    let now = new Date();
    let year = now.getFullYear(), month = now.getMonth(), today = now.getDate();
    let firstDay = new Date(year, month, 1).getDay();
    let days = new Date(year, month + 1, 0).getDate();
    let html = "";
    for(let i=0; i<firstDay; i++) html += "<div></div>";
    for(let d=1; d<=days; d++) {
        let cls = (d === today) ? "day today" : "day";
        html += `<div class="${cls}">${d}</div>`;
    }
    document.getElementById("miniCalendar").innerHTML = html;
}

/* LOAD SEMUA */
function loadDashboard() {
    loadWargaCount();
    loadKasRT();
    loadKasAgustusan();
    loadPengeluaranBulan();
    loadGrafikDashboard();
    loadMiniCalendar();
}

loadDashboard();
setInterval(loadDashboard, 10000); // Update tiap 10 detik
</script>
</body>
</html>
