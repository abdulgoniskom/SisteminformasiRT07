<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi RT 07</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#f1f4f9; display:flex; }
        
        /* SIDEBAR DEFAULT */
        .sidebar { width:220px; background:#2c3e50; height:100vh; color:white; position:fixed; flex-shrink: 0; overflow-y: auto; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); font-size: 18px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size: 14px; }
        .sidebar a:hover, .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; }
        
        .main { margin-left:220px; width:100%; min-width: 0; }
        
        /* HEADER */
        header { 
            background:white; padding:15px 30px; box-shadow:0 2px 5px rgba(0,0,0,0.1); 
            display:flex; align-items: center; justify-content: center; position: relative; min-height: 70px;
        }
        header h2 { font-size: 18px; color: #2c3e50; text-align: center; }
        .ketua-rt { font-size: 12px; font-weight: bold; color: #2f80ed; position: absolute; right: 30px; }

        /* CONTAINER RUNNING TEXT */
.running-text { 
    background: #f2994a; 
    color: white; 
    padding: 8px 0; /* Padding atas bawah saja */
    font-weight: bold; 
    font-size: 13px; 
    overflow: hidden; /* Sembunyikan teks yang keluar jalur */
    white-space: nowrap; /* Paksa teks jadi satu baris */
    display: flex;
    align-items: center;
}

/* ANIMASI HALUS */
.marquee-container {
    display: inline-block;
    padding-left: 100%; /* Mulai dari luar layar kanan */
    animation: jalan-terus 20s linear infinite; /* 20 detik, makin besar makin lambat/nyaman */
}

@keyframes jalan-terus {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* Pause saat disentuh (HP) atau di-hover (Laptop) agar mudah dibaca */
.running-text:hover .marquee-container {
    animation-play-state: paused;
}

@media (max-width: 768px) {
    .running-text { font-size: 11px; padding: 6px 0; }
}
        /* CONTAINER & CARDS */
        .container { padding:20px; }
        .cards { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { flex:1; min-width:180px; padding:15px; border-radius:10px; color:white; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
        .card:nth-child(1){background:#2f80ed;}
        .card:nth-child(2){background:#27ae60;}
        .card:nth-child(3){background:#eb5757;}
        .card:nth-child(4){background:#f2994a;}
        .card h3 { font-size:12px; margin-bottom:5px; opacity: 0.9; }
        .card p { font-size:18px; font-weight:bold; }
        
        .chart-box { background:white; padding:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        .mini-calendar { background:white; padding:15px; border-radius:10px; border: 1px solid #eee; margin-top:20px; }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-top: 10px;}
        .day { background:#f7f9fc; padding:5px; border-radius:3px; font-size:11px; text-align:center; }
        .today { background: #2f80ed; color: white; font-weight: bold; }

        /* PERBAIKAN KHUSUS HAPE */
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar h2 { font-size: 10px; padding: 10px 5px; }
            .sidebar a { padding: 12px 2px; font-size: 9px; text-align: center; border-left: none; }
            .sidebar a:hover, .sidebar a.active { border-left: none; background:#34495e; color: #1abc9c; }
            
            .main { margin-left: 80px; }
            
            header { flex-direction: column; padding: 10px; min-height: auto; }
            header h2 { font-size: 13px; margin-bottom: 5px; }
            .ketua-rt { position: static; font-size: 9px; }
            
            .container { padding: 10px; }
            .cards { gap: 10px; }
            .card { min-width: calc(50% - 5px); padding: 10px; } /* Kartu jadi 2 kolom di HP */
            .card h3 { font-size: 10px; }
            .card p { font-size: 14px; }
            
            .chart-box h3 { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html" class="active">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main">
    <header>
        <h2>Sistem Informasi RT 07 RW 09 Bumi Indah City</h2>
        <div class="ketua-rt">Ketua RT: Bpk. Muhammad Zainudin</div>
    </header>

    <div class="running-text">
    <div class="marquee-container" id="marqueeKonten">
        📢 Sedang memuat informasi terbaru...
    </div>

    <div class="container">
        <div class="cards">
            <div class="card">
                <h3>Total Kas RT</h3>
                <p id="totalKasRT">Rp 0</p>
            </div>
            <div class="card">
                <h3>Kas Agustusan</h3>
                <p id="kasAgustusan">Rp 0</p>
            </div>
            <div class="card">
                <h3>Pengeluaran</h3>
                <p id="pengeluaranBulan">Rp 0</p>
            </div>
            <div class="card">
                <h3>Warga</h3>
                <p id="jumlahWargaDisplay">...</p>
            </div>
        </div>

        <div class="chart-box">
            <h3 style="font-size: 14px; margin-bottom: 10px;">Grafik Kas RT</h3>
            <canvas id="kasChart" style="max-height: 250px;"></canvas>
            
            <div class="mini-calendar">
                <h3 style="font-size: 12px;">Kalender</h3>
                <div class="calendar-grid" id="miniCalendar"></div>
            </div>
        </div>
    </div>
</div>

<script>
// PERINTAH API TETAP SAMA (TIDAK ADA YANG DIUBAH)
const API = "https://script.google.com/macros/s/AKfycbxA1WFwM45lBSZMnEx87w53x8IVv-nOYUNRfaHZSuGLsuDgfIUlxhxq5UOqz7XafXk/exec";
const API_WARGA = "https://script.google.com/macros/s/AKfycbzxvpCt5-1f_9X-xxQYTt4XF7UutTvfVwhKOe89I4Iowb4BX5RZRqos1WMIXURSx1WR/exec";
const API_PENGUMUMAN = "https://script.google.com/macros/s/AKfycbx2PbPk0D5v2VBX0LsrFr8hKC-H2wz2IdqsQAQV5be5XMXVzLjcUNl1kg7lEXBq7XI/exec";

let chart;
function rupiah(angka) { return "Rp " + Number(angka).toLocaleString("id-ID"); }

function loadWargaCount() {
    fetch(API_WARGA + "?sheet=Data_Warga").then(res => res.json()).then(data => {
        if (data) document.getElementById("jumlahWargaDisplay").innerText = data.length + " Orang";
    });
}

function loadKasRT() {
    fetch(API + "?sheet=Kas_RT").then(res => res.json()).then(data => {
        let totalMasuk = 0, totalKeluar = 0, keluarBulanIni = 0, sekarang = new Date();
        data.forEach(d => {
            let m = Number(d.masuk || 0), k = Number(d.keluar || 0);
            totalMasuk += m; totalKeluar += k;
            let tgl = new Date(d.tanggal);
            if(tgl.getMonth() === sekarang.getMonth() && tgl.getFullYear() === sekarang.getFullYear()) keluarBulanIni += k;
        });
        document.getElementById("totalKasRT").innerText = rupiah(totalMasuk - totalKeluar);
        document.getElementById("pengeluaranBulan").innerText = rupiah(keluarBulanIni);
        updateGrafik(data);
    });
}

function loadKasAgustusan() {
    fetch(API + "?sheet=Kas_Agustusan").then(res => res.json()).then(data => {
        let total = 0;
        data.forEach(d => total += (Number(d.masuk || 0) - Number(d.keluar || 0)));
        document.getElementById("kasAgustusan").innerText = rupiah(total);
    });
}

function updateGrafik(data) {
    let bulanMasuk = Array(12).fill(0), bulanKeluar = Array(12).fill(0);
    data.forEach(d => {
        let tgl = new Date(d.tanggal);
        if (!isNaN(tgl)) {
            bulanMasuk[tgl.getMonth()] += Number(d.masuk || 0);
            bulanKeluar[tgl.getMonth()] += Number(d.keluar || 0);
        }
    });
    if(chart) chart.destroy();
    chart = new Chart(document.getElementById("kasChart"), {
        type: 'bar',
        data: {
            labels: ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],
            datasets: [
                { label: 'Masuk', data: bulanMasuk, backgroundColor: '#2f80ed' },
                { label: 'Keluar', data: bulanKeluar, backgroundColor: '#eb5757' }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function loadMiniCalendar() {
    let now = new Date(), days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate(), firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
    let html = "";
    for(let i=0; i<firstDay; i++) html += "<div></div>";
    for(let d=1; d<=days; d++) {
        let cls = (d === now.getDate()) ? "day today" : "day";
        html += `<div class="${cls}">${d}</div>`;
    }
    document.getElementById("miniCalendar").innerHTML = html;
}

function loadRunningText() {
    fetch(API_PENGUMUMAN + "?sheet=Pengumuman").then(res => res.json()).then(data => {
        if (data && data.length > 0) {
            // Ambil 3 pengumuman terbaru, gabungkan dengan separator yang jelas
            let teks = data.reverse().slice(0, 3).map(d => d.judul).join(" &nbsp;&nbsp;&nbsp; • &nbsp;&nbsp;&nbsp; ");
            document.getElementById("marqueeKonten").innerHTML = "📢 INFO TERBARU: " + teks + " &nbsp;&nbsp;&nbsp; ";
        }
    });
}
    
window.onload = () => { loadWargaCount(); loadKasRT(); loadKasAgustusan(); loadMiniCalendar(); loadRunningText(); };
</script>
</body>
</html>
