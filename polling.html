<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polling Warga RT 07</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #27ae60;
            --danger: #eb5757;
            --text: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f3f7; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            max-width: 400px; 
            width: 90%; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center;
        }

        h2 { font-size: 1.2rem; color: var(--text); margin-bottom: 25px; line-height: 1.4; }

        /* Tombol Utama */
        .btn-vote { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: 2px solid #dfe6e9; 
            border-radius: 12px; 
            background: white; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .btn-setuju { color: var(--success); border-color: var(--success); }
        .btn-setuju:hover { background: var(--success); color: white; }

        .btn-tidak { color: var(--danger); border-color: var(--danger); }
        .btn-tidak:hover { background: var(--danger); color: white; }

        /* Area Hasil & Grafik */
        .result-box { margin-top: 25px; text-align: left; display: none; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        
        .bar-bg { background: #dfe6e9; border-radius: 50px; height: 14px; margin-bottom: 20px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.1, 0.5, 0.5, 1); }
        
        .bg-setuju { background: var(--success); }
        .bg-tidak { background: var(--danger); }

        .voted-badge { 
            background: #f1f2f6; 
            color: #7f8c8d; 
            padding: 8px; 
            border-radius: 8px; 
            font-size: 12px; 
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="poll-area">
        <h2 id="topikRapat">Memuat Topik Polling...</h2>
        <button class="btn-vote btn-setuju" onclick="prosesVote('setuju')">👍 SETUJU</button>
        <button class="btn-vote btn-tidak" onclick="prosesVote('tidak setuju')">👎 TIDAK SETUJU</button>
    </div>

    <div id="result-area" class="result-box">
        <h3 style="font-size: 16px; text-align: center;">Hasil Polling Saat Ini</h3>
        
        <div class="info-row">
            <span>Setuju</span>
            <span id="txtSetuju">0 Suara (0%)</span>
        </div>
        <div class="bar-bg"><div id="barSetuju" class="bar-fill bg-setuju"></div></div>

        <div class="info-row">
            <span>Tidak Setuju</span>
            <span id="txtTidak">0 Suara (0%)</span>
        </div>
        <div class="bar-bg"><div id="barTidak" class="bar-fill bg-tidak"></div></div>

        <div style="text-align:center">
            <span class="voted-badge">✅ Anda sudah memberikan suara</span>
        </div>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP ANDA
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzz9572DLFKJDLcJQDjEw2o9r1tYkMUjxgedKlXr5iV7MuHQrAVCCp16-fJWQhdOio/exec";

    window.onload = function() {
        muatData();
    };

    function muatData() {
        fetch(scriptUrl + "?action=read")
            .then(res => res.json())
            .then(data => {
                document.getElementById('topikRapat').innerText = data.topik;
                
                // Cek apakah HP ini sudah pernah vote
                if (localStorage.getItem('voted_rt07')) {
                    tampilkanGrafik(data);
                }
            })
            .catch(err => {
                document.getElementById('topikRapat').innerText = "Gagal memuat data rapat.";
            });
    }

    function prosesVote(pilihan) {
        if (localStorage.getItem('voted_rt07')) {
            alert("Anda sudah memberikan suara sebelumnya.");
            return;
        }

        if (confirm(`Anda yakin memilih "${pilihan.toUpperCase()}"?`)) {
            // Tampilkan loading sederhana
            document.getElementById('topikRapat').innerText = "Mengirim suara...";
            
            fetch(`${scriptUrl}?action=vote&pilihan=${pilihan}`)
                .then(res => res.json())
                .then(res => {
                    alert(res.msg);
                    localStorage.setItem('voted_rt07', 'true');
                    // Ambil data terbaru setelah vote untuk update grafik
                    muatData(); 
                });
        }
    }

    function tampilkanGrafik(data) {
        document.getElementById('poll-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';

        const v1 = Number(data.v1) || 0;
        const v2 = Number(data.v2) || 0;
        const total = v1 + v2;

        const p1 = total === 0 ? 0 : Math.round((v1 / total) * 100);
        const p2 = total === 0 ? 0 : Math.round((v2 / total) * 100);

        // Update Teks
        document.getElementById('txtSetuju').innerText = `${v1} Suara (${p1}%)`;
        document.getElementById('txtTidak').innerText = `${v2} Suara (${p2}%)`;

        // Jalankan Animasi Grafik (Sedikit delay agar transisi terlihat)
        setTimeout(() => {
            document.getElementById('barSetuju').style.width = p1 + '%';
            document.getElementById('barTidak').style.width = p2 + '%';
        }, 100);
    }
</script>

</body>
</html>
