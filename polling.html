<body>

<div class="card">
    <div id="poll-area">
        <h2 id="topikRapat">Memuat Topik Rapat...</h2>
        <button class="btn-vote btn-setuju" onclick="vote('setuju')">👍 SETUJU</button>
        <button class="btn-vote btn-tidak" onclick="vote('tidak setuju')">👎 TIDAK SETUJU</button>
    </div>

    <div id="result-area" class="result-box">
        <h3 style="font-size: 16px;">Hasil Keputusan Sementara:</h3>
        <p id="label1"></p>
        <div class="bar-container"><div id="bar1" class="bar bar-setuju"></div></div>
        <p id="label2"></p>
        <div class="bar-container"><div id="bar2" class="bar bar-tidak"></div></div>
    </div>
    
    <button onclick="bukaLogin()" style="margin-top:20px; background:none; border:none; color:#bdc3c7; font-size:10px; cursor:pointer;">⚙️ Admin Panel</button>
</div>

<div id="modalLogin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div class="card" style="margin-top:100px; position:relative;">
        <h3>Login Admin</h3>
        <input type="text" id="userAdmin" placeholder="Username" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
        <input type="password" id="passAdmin" placeholder="Password" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;">
        <button onclick="prosesLogin()" style="width:100%; padding:10px; background:#6c5ce7; color:white; border:none; border-radius:5px; font-weight:bold;">Masuk</button>
        <button onclick="tutupLogin()" style="margin-top:10px; background:none; border:none; color:red; cursor:pointer;">Batal</button>
    </div>
</div>

<div id="modalAdmin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1001;">
    <div class="card" style="margin-top:80px;">
        <h3>⚙️ Ganti Topik Rapat</h3>
        <textarea id="newTopik" rows="3" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px;" placeholder="Tulis topik rapat baru..."></textarea>
        <button onclick="updateTopik()" style="width:100%; padding:10px; background:#27ae60; color:white; border:none; border-radius:5px; font-weight:bold;">Update & Reset Suara</button>
        <button onclick="location.reload()" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Keluar</button>
    </div>
</div>

<script>
    // FUNGSI LOGIN & ADMIN
    function bukaLogin() { document.getElementById('modalLogin').style.display = 'block'; }
    function tutupLogin() { document.getElementById('modalLogin').style.display = 'none'; }

    function prosesLogin() {
        const u = document.getElementById('userAdmin').value;
        const p = document.getElementById('passAdmin').value;

        google.script.run.withSuccessHandler(res => {
            if(res) {
                document.getElementById('modalLogin').style.display = 'none';
                document.getElementById('modalAdmin').style.display = 'block';
            } else {
                alert("Login Gagal! Username/Password Salah.");
            }
        }).checkLogin(u, p);
    }

    function updateTopik() {
        const topik = document.getElementById('newTopik').value;
        if(!topik) return alert("Topik tidak boleh kosong!");
        
        if(confirm("Mengubah topik akan menghapus hasil suara sebelumnya. Lanjutkan?")) {
            google.script.run.withSuccessHandler(msg => {
                alert(msg);
                // Reset localStorage agar admin bisa ikut ngetes (opsional)
                localStorage.removeItem('voted_rt07');
                location.reload();
            }).updateTopikPolling(topik);
        }
    }

    // FUNGSI POLLING WARGA (Sama seperti sebelumnya)
    window.onload = function() {
        google.script.run.withSuccessHandler(data => {
            document.getElementById('topikRapat').innerText = data.topik;
            window.pollData = data;
            if (localStorage.getItem('voted_rt07')) { tampilkanHasil(data); }
        }).getPollingData();
    };

    function vote(pilihan) {
        if (localStorage.getItem('voted_rt07')) return alert("Anda sudah memilih!");
        google.script.run.withSuccessHandler(msg => {
            alert(msg);
            localStorage.setItem('voted_rt07', 'true');
            location.reload();
        }).submitVote(pilihan);
    }

    function tampilkanHasil(data) {
        document.getElementById('poll-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        const total = data.v1 + data.v2;
        const p1 = total === 0 ? 0 : Math.round((data.v1 / total) * 100);
        const p2 = total === 0 ? 0 : Math.round((data.v2 / total) * 100);
        document.getElementById('label1').innerText = `Setuju: ${data.v1} (${p1}%)`;
        document.getElementById('bar1').style.width = p1 + '%';
        document.getElementById('label2').innerText = `Tidak Setuju: ${data.v2} (${p2}%)`;
        document.getElementById('bar2').style.width = p2 + '%';
    }
</script>

</body>
