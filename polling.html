<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polling Warga RT 07</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #27ae60;
            --danger: #eb5757;
            --text: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f3f7; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            max-width: 400px; 
            width: 90%; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center;
        }

        h2 { font-size: 1.2rem; color: var(--text); margin-bottom: 25px; line-height: 1.4; }

        .btn-vote { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: 2px solid #dfe6e9; 
            border-radius: 12px; 
            background: white; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .btn-setuju { color: var(--success); border-color: var(--success); }
        .btn-setuju:hover { background: var(--success); color: white; }

        .btn-tidak { color: var(--danger); border-color: var(--danger); }
        .btn-tidak:hover { background: var(--danger); color: white; }

        .result-box { margin-top: 25px; text-align: left; display: none; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        
        .bar-bg { background: #dfe6e9; border-radius: 50px; height: 14px; margin-bottom: 20px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.1, 0.5, 0.5, 1); }
        
        .bg-setuju { background: var(--success); }
        .bg-tidak { background: var(--danger); }

        .voted-badge { 
            background: #f1f2f6; 
            color: #7f8c8d; 
            padding: 8px; 
            border-radius: 8px; 
            font-size: 12px; 
            display: inline-block;
            margin-top: 15px;
        }

        /* Modal Admin */
        .modal-admin {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 1000;
        }
        .modal-content {
            background: white; 
            width: 85%; 
            max-width: 350px; 
            margin: 100px auto; 
            padding: 25px; 
            border-radius: 15px; 
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="poll-area">
        <h2 id="topikRapat">Memuat Topik Polling...</h2>
        <div id="tombol-pilihan">
            <button class="btn-vote btn-setuju" onclick="prosesVote('setuju')">👍 SETUJU</button>
            <button class="btn-vote btn-tidak" onclick="prosesVote('tidak')">👎 TIDAK SETUJU</button>
        </div>
    </div>

    <div id="result-area" class="result-box">
        <h3 style="font-size: 16px; text-align: center;">Hasil Polling Saat Ini</h3>
        
        <div class="info-row">
            <span>Setuju</span>
            <span id="txtSetuju">0 Suara (0%)</span>
        </div>
        <div class="bar-bg"><div id="barSetuju" class="bar-fill bg-setuju"></div></div>

        <div class="info-row">
            <span>Tidak Setuju</span>
            <span id="txtTidak">0 Suara (0%)</span>
        </div>
        <div class="bar-bg"><div id="barTidak" class="bar-fill bg-tidak"></div></div>

        <div style="text-align:center">
            <span class="voted-badge">✅ Anda sudah memberikan suara</span>
        </div>
    </div>
</div>

<div style="margin-top: 25px;">
    <button onclick="bukaModalLogin()" style="background:none; border:none; color:#bbb; cursor:pointer; font-size: 11px;">⚙️ Admin Sistem</button>
</div>

<div id="modalLogin" class="modal-admin">
    <div class="modal-content">
        <h3>🔐 Reset Data Polling</h3>
        <p style="font-size: 13px; color: #666;">Masukkan password admin untuk mengosongkan hasil suara.</p>
        <input type="password" id="passAdmin" placeholder="Password Admin" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        <button onclick="eksekusiReset()" style="width:100%; padding:12px; background:#eb5757; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">⚠️ KOSONGKAN SEKARANG</button>
        <button onclick="tutupModal()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Batal</button>
    </div>
</div>

<script>
    // URL Web App Apps Script Bapak
    const scriptUrl = "https://script.google.com/macros/s/AKfycbw2crmFmnv4U9W_K5WavLzejltRgxuSB9SvxANov8JkJUj4jrjvKf_jMssw5X3MXQ8/exec";

    window.onload = function() {
        muatData();
    };

    function muatData() {
        fetch(scriptUrl + "?action=read")
            .then(res => res.json())
            .then(data => {
                const topikElem = document.getElementById('topikRapat');
                topikElem.innerText = data.topik;
                
                if (data.topik === "- Belum Ada Polling Aktif -") {
                    document.getElementById('tombol-pilihan').style.display = 'none';
                    document.getElementById('result-area').style.display = 'none';
                    topikElem.style.color = "#ccc";
                    return;
                } else {
                    topikElem.style.color = "var(--text)";
                }

                // Cek pengunci berdasarkan nama topik
                const historyVote = localStorage.getItem('voted_topik_name');
                if (historyVote === data.topik) {
                    tampilkanGrafik(data);
                } else {
                    document.getElementById('poll-area').style.display = 'block';
                    document.getElementById('tombol-pilihan').style.display = 'block';
                    document.getElementById('result-area').style.display = 'none';
                }
            })
            .catch(err => {
                document.getElementById('topikRapat').innerText = "Gagal memuat data.";
            });
    }

    function prosesVote(pilihan) {
        const topikAktif = document.getElementById('topikRapat').innerText;
        if (confirm(`Anda yakin memilih "${pilihan.toUpperCase()}"?`)) {
            document.getElementById('tombol-pilihan').innerHTML = "<p style='color:#aaa'>Mengirim suara...</p>";
            fetch(`${scriptUrl}?action=vote&pilihan=${pilihan}`)
                .then(res => res.json())
                .then(res => {
                    alert(res.msg);
                    localStorage.setItem('voted_topik_name', topikAktif);
                    muatData(); 
                });
        }
    }

    function tampilkanGrafik(data) {
        document.getElementById('tombol-pilihan').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';

        const v1 = Number(data.v1) || 0;
        const v2 = Number(data.v2) || 0;
        const total = v1 + v2;

        const p1 = total === 0 ? 0 : Math.round((v1 / total) * 100);
        const p2 = total === 0 ? 0 : Math.round((v2 / total) * 100);

        document.getElementById('txtSetuju').innerText = `${v1} Suara (${p1}%)`;
        document.getElementById('txtTidak').innerText = `${v2} Suara (${p2}%)`;

        setTimeout(() => {
            document.getElementById('barSetuju').style.width = p1 + '%';
            document.getElementById('barTidak').style.width = p2 + '%';
        }, 100);
    }

    // --- FUNGSI ADMIN ---
    function bukaModalLogin() { document.getElementById('modalLogin').style.display = 'block'; }
    function tutupModal() { document.getElementById('modalLogin').style.display = 'none'; }

    function eksekusiReset() {
        const pass = document.getElementById('passAdmin').value;
        // Ganti "rahasia123" dengan password admin Bapak di Code.gs
        if (pass === "rahasia123") {
            if (confirm("Hapus semua hasil suara?")) {
                fetch(scriptUrl + "?action=reset")
                    .then(res => res.json())
                    .then(res => {
                        alert(res.msg);
                        location.reload();
                    });
            }
        } else {
            alert("Password Salah!");
        }
    }
</script>

</body>
</html>
