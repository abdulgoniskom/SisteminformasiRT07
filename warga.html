<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Warga RT 07 - RT 07 RW 09</title>
    <style>
        /* CSS DASAR (Persis seperti kodingan awal Anda) */
        * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
        body { background:#eef2f7; display:flex; overflow-x: hidden; }

        .sidebar { 
            width:220px; background:#2c3e50; height:100vh; color:white; 
            position:fixed; transition: 0.3s; z-index: 1000; left: 0;
        }
        .sidebar.closed { left: -220px; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); font-size:18px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover { background:#34495e; border-left: 4px solid #1abc9c; }
        .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; font-weight: bold; }
        
        .main { margin-left:220px; width:100%; transition: 0.3s; min-height: 100vh; }
        .main.expanded { margin-left: 0; }

        header { 
            background:#2f80ed; color:white; padding:15px; 
            display:flex; justify-content:space-between; align-items: center; 
            position: sticky; top: 0; z-index: 900;
        }
        .menu-btn { font-size: 24px; cursor: pointer; color: white; margin-right: 15px; }

        .container { padding:20px; max-width:1100px; margin:auto; }
        .card { 
            background:white; padding:15px; border-radius:10px; 
            margin-bottom:20px; box-shadow:0 4px 8px rgba(0,0,0,0.1); 
        }

        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .search-box { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; width: 250px; outline: none; }
        .search-box:focus { border-color: #2f80ed; }

        .table-container { overflow-x: auto; }
        table { width:100%; border-collapse:collapse; background:white; min-width:600px; }
        th, td { padding:12px; border-bottom:1px solid #ddd; text-align:left; font-size: 13px; }
        th { background:#2f80ed; color:white; text-align: center; }
        tr:hover { background:#f5f9ff; }

        .btn { padding:8px 14px; border:none; border-radius:4px; cursor:pointer; color:white; font-size: 12px; font-weight: bold; }
        .btn-add { background:#1abc9c; }
        .btn-edit { background:#3498db; }
        .btn-delete { background:#e74c3c; }
        .btn-pdf { background:#e67e22; }
        .btn-login-pos { background: #2c3e50; border: 1px solid #34495e; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:2000; }
        .modal-content { background:white; padding:20px; border-radius:8px; width:320px; text-align:center; }
        .modal-content input, .modal-content select { width: 100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:4px; }
        .modal-content button { background:#2f80ed; border:none; color:white; padding:10px 20px; border-radius:4px; cursor:pointer; width: 100%; font-weight: bold; }

        @media (max-width: 768px) {
            .sidebar { left: -220px; }
            .sidebar.open { left: 0; }
            .main { margin-left: 0; }
            .search-box { width: 100%; }
            .toolbar-btns { width: 100%; display: flex; gap: 5px; justify-content: space-between; }
            .toolbar-btns .btn { flex: 1; padding: 10px 5px; font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html" class="active">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main" id="mainContent">
    <header>
        <div style="display: flex; align-items: center;">
            <div class="menu-btn" onclick="toggleSidebar()">☰</div>
            <h2 style="font-size: 16px;">Data Warga RT 07 RW 09 Bumi Indah City</h2>
        </div>
        <div id="statusAdmin" style="font-size: 12px; background: #1abc9c; padding: 5px 10px; border-radius: 4px; display: none;">Mode Admin Aktif</div>
    </header>

    <div class="container">
        <div class="card">
            <div class="toolbar">
                <input type="text" id="cariNama" class="search-box" placeholder="Cari Nama Warga..." onkeyup="filterWarga()">
                
                <div class="toolbar-btns" style="display: flex; gap: 10px;">
                    <button class="btn btn-login-pos" id="adminToggle" onclick="tampilkanLogin()">Login Admin</button>
                    <button id="btnTambah" class="btn btn-add" style="display:none;" onclick="tambahWarga()">+ Tambah Warga</button>
                    <button class="btn btn-pdf" onclick="cetakPDF()">🧾 Cetak PDF</button>
                </div>
            </div>

            <div class="table-container">
                <table id="tabelWarga">
                    <thead>
                        <tr>
                            <th style="width: 50px;">No</th>
                            <th>Nama Lengkap</th>
                            <th>Alamat / Blok</th>
                            <th>Status Warga</th>
                            <th id="thAksi" style="display:none;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="isiTabel">
                        <tr><td colspan="5" style="text-align:center;">Memuat data warga...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h3 id="formTitle">Tambah Warga</h3>
        <input type="hidden" id="rowId">
        <input type="text" id="namaWarga" placeholder="Nama Lengkap">
        <input type="text" id="alamatWarga" placeholder="Alamat / No. Rumah">
        <select id="statusWarga">
            <option value="Warga Tetap">Warga Tetap</option>
            <option value="Warga Sementara">Warga Sementara</option>
        </select>
        <button id="btnSimpan" onclick="submitForm()">Simpan Data</button>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>Login Pengurus</h3>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="loginAdmin()">Masuk</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
// MASUKKAN URL APPS SCRIPT ANDA DI SINI
const API_URL = "https://script.google.com/macros/s/AKfycbxgATW3uNvEDa0bt-Vtqv7d0wLSufxGko0M0aUOA4e6pqd8CNM1TtJWeGgD_xTImJNN/exec"; 
let dataWarga = [];
let isAdmin = false;

function toggleSidebar() {
    const sidebar = document.getElementById("mySidebar");
    const main = document.getElementById("mainContent");
    if (window.innerWidth > 768) {
        sidebar.classList.toggle("closed");
        main.classList.toggle("expanded");
    } else {
        sidebar.classList.toggle("open");
    }
}

function tampilkanLogin(){ document.getElementById("loginModal").style.display="flex"; }

async function loginAdmin() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    const btnLogin = document.querySelector("#loginModal button");

    if (!user || !pass) { alert("Harap isi username dan password!"); return; }
    btnLogin.innerText = "Memverifikasi..."; btnLogin.disabled = true;

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", sheet: "Data_Warga", username: user, password: pass })
        });
        const hasil = await response.json();

        if (hasil.status === "success") {
            isAdmin = true;
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("btnTambah").style.display = "inline-block";
            document.getElementById("thAksi").style.display = "table-cell";
            document.getElementById("statusAdmin").style.display = "block";
            const btnToggle = document.getElementById("adminToggle");
            btnToggle.innerText = "Logout Admin";
            btnToggle.classList.add("btn-delete"); 
            btnToggle.onclick = () => location.reload();
            tampilkanData();
            alert("Login Berhasil!");
        } else { alert("Username atau Password Salah!"); }
    } catch (error) { alert("Gagal terhubung ke server."); }
    finally { btnLogin.innerText = "Masuk"; btnLogin.disabled = false; }
}

async function ambilData(){
    try {
        const res = await fetch(API_URL + "?sheet=Data_Warga");
        dataWarga = await res.json();
        tampilkanData();
    } catch (e) {
        document.querySelector("#isiTabel").innerHTML = "<tr><td colspan='5' style='text-align:center; color:red;'>Gagal memuat data.</td></tr>";
    }
}

function filterWarga() {
    const keyword = document.getElementById("cariNama").value.toLowerCase();
    const filteredData = dataWarga.filter(warga => 
        (warga.nama || "").toLowerCase().includes(keyword) || 
        (warga.alamat || "").toLowerCase().includes(keyword)
    );
    tampilkanData(filteredData);
}
    
function tampilkanData(dataManual = null){
    const list = dataManual || dataWarga;
    const tbody = document.getElementById("isiTabel");
    tbody.innerHTML = "";
    
    if (list.length === 0) {
        tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Tidak ada data warga.</td></tr>";
        return;
    }
    
    list.forEach((warga, index) => {
        // DISESUAIKAN DENGAN HEADER: No, Nama, Alamat, Status
        const nama = warga.nama || "-";
        const alamat = warga.alamat || "-";
        const status = warga.status || "-";

        const row = document.createElement("tr");
        row.innerHTML = `
            <td style="text-align:center;">${index+1}</td>
            <td>${nama}</td>
            <td>${alamat}</td>
            <td style="text-align:center;">${status}</td>
            ${isAdmin ? `
                <td style="text-align:center;">
                    <button class="btn btn-edit" onclick="prepareEdit(${dataWarga.indexOf(warga)})">Edit</button>
                    <button class="btn btn-delete" onclick="hapusWarga(${warga.row_id})">Hapus</button>
                </td>
            ` : ""}
        `;
        tbody.appendChild(row);
    });
}
function tambahWarga(){
    document.getElementById("formTitle").innerText = "Tambah Warga Baru";
    document.getElementById("rowId").value = "";
    document.getElementById("namaWarga").value = "";
    document.getElementById("alamatWarga").value = "";
    document.getElementById("formModal").style.display = "flex";
}

function prepareEdit(index){
    const item = dataWarga[index];
    document.getElementById("formTitle").innerText = "Edit Data Warga";
    document.getElementById("rowId").value = item.row_id;
    
    // DISESUAIKAN DENGAN HEADER: nama, alamat, status
    document.getElementById("namaWarga").value = item.nama || "";
    document.getElementById("alamatWarga").value = item.alamat || "";
    document.getElementById("statusWarga").value = item.status || "Warga Tetap";
    
    document.getElementById("formModal").style.display = "flex";
}
async function submitForm(){
    const rowId = document.getElementById("rowId").value;
    const btn = document.getElementById("btnSimpan");
    const payload = {
        sheet: "Data_Warga",
        action: rowId ? "update" : "insert",
        row_id: rowId,
        nama: document.getElementById("namaWarga").value,
        alamat: document.getElementById("alamatWarga").value,
        status: document.getElementById("statusWarga").value
    };
    btn.innerText = "Proses Menyimpan..."; btn.disabled = true;
    await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
    document.getElementById("formModal").style.display = "none";
    btn.innerText = "Simpan Data"; btn.disabled = false;
    ambilData(); 
}

async function hapusWarga(row_id){
    if(confirm("Apakah Anda yakin ingin menghapus data warga ini?")){
        const payload = { sheet: "Data_Warga", action: "delete", row_id: row_id };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        ambilData();
    }
}

function cetakPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const tgl = new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
    const pageWidth = doc.internal.pageSize.getWidth();

    doc.setFontSize(16);
    doc.text("DATA WARGA RT 07 RW 09", 105, 15, { align: "center" });
    doc.setFontSize(11);
    doc.text("Perumahan Bumi Indah City - Tangerang", 105, 22, { align: "center" });
    doc.line(20, 25, 190, 25);

    const rows = dataWarga.map((w,i)=>[
        i+1, 
        w.nama_lengkap || w.nama, 
        w.alamat_/_blok || w.alamat, 
        w.status_warga || w.status
    ]);

    doc.autoTable({ 
        head:[["No","Nama Lengkap","Alamat / Blok","Status Warga"]], 
        body:rows, 
        startY: 30,
        headStyles: { fillColor: [47, 128, 237], halign: 'center' }
    });

    let ttdY = doc.lastAutoTable.finalY + 20;
    if (ttdY > 250) { doc.addPage(); ttdY = 20; }
    doc.text(`Tangerang, ${tgl}`, pageWidth - 20, ttdY, { align: "right" });
    doc.text("Mengetahui,", 20, ttdY + 10);
    doc.text("Ketua RT 07", 20, ttdY + 18);
    doc.text("( Muhammad Zainudin )", 20, ttdY + 40);
    doc.text("Sekretaris RT 07", pageWidth - 20, ttdY + 18, { align: "right" });
    doc.text("( Aris Munandar )", pageWidth - 20, ttdY + 40, { align: "right" });

    doc.save(`Data_Warga_RT07.pdf`);
}

window.onclick = e => { if(e.target.classList.contains("modal")) e.target.style.display="none"; }
ambilData();
</script>
</body>
</html>
