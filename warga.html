<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Warga RT 07</title>
<style>
/* CSS DASAR */
body { margin:0; font-family:Arial, sans-serif; background:#eef2f7; }
.sidebar { width: 220px; background: #2c3e50; height: 100vh; color: white; position: fixed; }
.sidebar h2 { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); font-size: 18px; }
.sidebar a { display: block; color: white; padding: 15px; text-decoration: none; font-size: 14px; }
.sidebar a:hover, .sidebar a.active { background: #34495e; border-left: 4px solid #1abc9c; }
.content { margin-left: 220px; padding: 30px; }

/* JUDUL TENGAH */
h1 { color:#2c3e50; margin-bottom:20px; text-align: center; }

.table-container{ max-width:100%; overflow-x:auto; }
table{ width:100%; border-collapse:collapse; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.1); min-width:400px; }
th, td{ padding:12px; border-bottom:1px solid #ddd; text-align:left; }
th{ background:#1abc9c; color:white; }
tr:hover{ background:#f1f1f1; }

.btn{ padding:8px 14px; margin-right:5px; border:none; border-radius:4px; cursor:pointer; color:white; }
.btn-add{background:#1abc9c;}
.btn-edit{background:#3498db;}
.btn-delete{background:#e74c3c;}
.btn-pdf{background:#e67e22; margin-bottom:10px;}

.modal{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
.modal-content{ background:white; padding:20px; border-radius:8px; width:300px; text-align:center; }
.modal-content input, .modal-content select{ width:90%; padding:8px; margin:8px 0; border:1px solid #ccc; border-radius:4px; }
.modal-content button{ background:#1abc9c; border:none; color:white; padding:10px 15px; border-radius:4px; cursor:pointer; margin-top:10px; }

@media screen and (max-width:768px){
    .sidebar{width:60px;} .sidebar h2{display:none;} .content{margin-left:60px;padding:10px;}
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html" class="active">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html">Arsip</a>
    <a href="struktur.html">Struktur</a>
    <button onclick="tampilkanLogin()" style="margin: 10px; padding: 5px; cursor: pointer; width: 80%;">Login Admin</button>
</div>

<div class="content">
    <h1>Data Warga RT 07 RW 09</h1>
    <div style="text-align: center;">
        <button id="btnTambah" class="btn btn-add" style="display:none;" onclick="tambahWarga()">Tambah Warga</button>
        <button class="btn btn-pdf" onclick="cetakPDF()">Cetak PDF</button>
    </div>
    <br>
    <div class="table-container">
        <table id="tabelWarga">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>Alamat</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h3 id="formTitle">Tambah Warga</h3>
        <input type="hidden" id="rowId">
        <input type="text" id="namaWarga" placeholder="Nama Warga"><br>
        <input type="text" id="alamatWarga" placeholder="Alamat"><br>
        <select id="statusWarga">
            <option value="Warga Tetap">Warga Tetap</option>
            <option value="Warga Sementara">Warga Sementara</option>
        </select>
        <button onclick="submitForm()">Simpan</button>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>Login Admin</h3>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="loginAdmin()">Login</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzNwfgwO8RxRquTeG-lKTxAbYcVXS7YwnL4dAu56_DXsQHU1rY2cB-B4Novp6hVvzab/exec"; 
let dataWarga = [];
let isAdmin = false;

// 1. FUNGSI LOGIN (Yang tadi hilang)
function tampilkanLogin(){ 
    document.getElementById("loginModal").style.display="flex"; 
}

function loginAdmin(){
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    
    // Sesuaikan username & password di sini
    if(user === "admin" && pass === "admin123"){
        isAdmin = true;
        document.getElementById("loginModal").style.display = "none";
        document.getElementById("btnTambah").style.display = "inline-block"; // Munculkan tombol tambah
        tampilkanData(); // Refresh tabel agar tombol edit/hapus muncul
        alert("Login Berhasil! Sekarang Anda bisa menambah/mengedit data.");
    } else { 
        alert("Username atau password salah!"); 
    }
}

// 2. FUNGSI MODAL TAMBAH & EDIT (Yang tadi hilang)
function tambahWarga(){
    document.getElementById("formTitle").innerText = "Tambah Warga";
    document.getElementById("rowId").value = "";
    document.getElementById("namaWarga").value = "";
    document.getElementById("alamatWarga").value = "";
    document.getElementById("formModal").style.display = "flex";
}

function prepareEdit(index){
    const item = dataWarga[index];
    document.getElementById("formTitle").innerText = "Edit Warga";
    document.getElementById("rowId").value = item.row_id;
    document.getElementById("namaWarga").value = item.nama;
    document.getElementById("alamatWarga").value = item.alamat;
    document.getElementById("statusWarga").value = item.status;
    document.getElementById("formModal").style.display = "flex";
}

// 3. FUNGSI DATA (Ambil & Tampil)
async function ambilData(){
    try {
        const res = await fetch(API_URL + "?sheet=Data_Warga");
        dataWarga = await res.json();
        tampilkanData();
    } catch (e) {
        console.log("Gagal ambil data");
    }
}

function tampilkanData(){
    const tbody = document.querySelector("#tabelWarga tbody");
    tbody.innerHTML = "";
    dataWarga.forEach((warga, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${index+1}</td>
            <td>${warga.nama || ''}</td>
            <td>${warga.alamat || ''}</td>
            <td>${warga.status || ''}</td>
            <td>
                ${isAdmin ? `
                    <button class="btn btn-edit" onclick="prepareEdit(${index})">Edit</button>
                    <button class="btn btn-delete" onclick="hapusWarga(${warga.row_id})">Hapus</button>
                ` : '-'}
            </td>
        `;
        tbody.appendChild(row);
    });
}

// 4. FUNGSI SIMPAN & HAPUS
async function submitForm(){
    const rowId = document.getElementById("rowId").value;
    const action = rowId ? "update" : "insert";
    const payload = {
        sheet: "Data_Warga",
        action: action,
        row_id: rowId,
        nama: document.getElementById("namaWarga").value,
        alamat: document.getElementById("alamatWarga").value,
        status: document.getElementById("statusWarga").value
    };
    
    // Tampilkan loading sederhana
    document.querySelector("#formModal button").innerText = "Menyimpan...";
    
    await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
    document.getElementById("formModal").style.display = "none";
    document.querySelector("#formModal button").innerText = "Simpan";
    ambilData(); 
}

async function hapusWarga(row_id){
    if(confirm("Hapus data warga ini?")){
        const payload = { sheet: "Data_Warga", action: "delete", row_id: row_id };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        ambilData();
    }
}

// 5. CETAK PDF
function cetakPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const tgl = new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });

    doc.setFontSize(16);
    doc.text("Data Warga RT 07 RW 09 Bumi Indah City", 105, 20, { align: "center" });

    const rows = dataWarga.map((w,i)=>[i+1, w.nama, w.alamat, w.status]);
    doc.autoTable({ 
        head:[["No","Nama","Alamat","Status"]], 
        body:rows, 
        startY:30,
        theme: 'grid',
        headStyles: { fillColor: [26, 188, 156] }
    });

    const finalY = doc.lastAutoTable.finalY + 20;
    doc.setFontSize(11);
    doc.text(`Tangerang, ${tgl}`, 140, finalY);
    doc.text("Mengetahui,", 30, finalY + 10);
    doc.text("Sekretaris,", 140, finalY + 10);
    doc.setFont(undefined, 'bold');
    doc.text("MUHAMMAD ZAINUDIN", 30, finalY + 35);
    doc.text("ARIS MUNANDAR", 140, finalY + 35);
    doc.setFont(undefined, 'normal');
    doc.text("Ketua RT 07", 30, finalY + 40);
    doc.text("Sekretaris RT 07", 140, finalY + 40);

    doc.save(`Data_Warga_RT07_${tgl}.pdf`);
}

window.onclick = e => { if(e.target.classList.contains("modal")) e.target.style.display="none"; }
ambilData();
</script>
</body>
</html>
