<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman RT</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

/* SIDEBAR */

.sidebar{
width:170px;
background:#2c3e50;
color:white;
height:100vh;
position:fixed;
left:0;
top:0;
}

.sidebar h2{
text-align:center;
padding:15px;
font-size:16px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
font-size:14px;
}

.sidebar a:hover{
background:#34495e;
}

/* MAIN */

.main{
margin-left:170px;
}

header{
background:#2f80ed;
color:white;
padding:15px;
text-align:center;
}

/* CONTAINER */

.container{
padding:20px;
max-width:950px;
margin:auto;
}

/* CARD */

.card{
background:white;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
overflow:hidden;
position:relative;
}

/* BADGE BARU */

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:3px 8px;
font-size:12px;
border-radius:4px;
}

/* GAMBAR */

.card img{
width:100%;
max-height:280px;
object-fit:cover;
}

/* ISI */

.card-content{
padding:15px;
}

.card h3{
margin:0 0 10px 0;
color:#2c3e50;
}

.card p{
white-space:pre-line;
line-height:1.6;
color:#333;
}

/* FORM ADMIN */

button{
background:#2f80ed;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1f6fd1;
}

.formInput{
display:none;
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:8px;
margin:6px 0;
}

textarea{
height:120px;
}

/* RESPONSIVE */

@media (max-width:768px){

.sidebar{
width:120px;
}

.main{
margin-left:120px;
}

}

</style>
</head>
<body>

<div class="sidebar">
<h2>RT 07 RW 09</h2>

<a href="index.html">Dashboard</a>
<a href="kas.html">Kas RT</a>
<a href="warga.html">Data Warga</a>
<a href="pengumuman.html">Pengumuman</a>
<a href="kalender.html">Kalender</a>
<a href="arsip.html">Arsip</a>

</div>

<div class="main">

<header>
<h2>Pengumuman RT 07</h2>
</header>

<div class="container">

<div id="listPengumuman"></div>

<div style="text-align:right">
<button onclick="login()">Login Admin</button>
</div>

<div class="formInput" id="formInput">

<h3>Tambah Pengumuman</h3>

<input type="text" id="judul" placeholder="Judul pengumuman">

<input type="text" id="gambar" placeholder="Link gambar (opsional)">

<textarea id="konten" placeholder="Isi pengumuman"></textarea>

<button onclick="simpan()">Simpan</button>

</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwb2hEhLDeF6p-CKjPizKwm1sD4fTplDi72gn0QOjpgrotVhXGo0MY_AM9bQQ-D7j4/exec";

function login(){

let u=prompt("Username");
let p=prompt("Password");

if(u=="admin" && p=="12345"){

document.getElementById("formInput").style.display="block";

}else{

alert("Login gagal");

}

}

/* LOAD DATA */

function loadData(){

fetch(API)

.then(res=>res.json())

.then(data=>{

data=data.reverse();

let html="";

data.forEach((d,i)=>{

const judul=d.judul||"";
const gambar=d.gambar||"";
const konten=d.konten||"";

html+=`
<div class="card">

${i==0?'<div class="badge">BARU</div>':''}

${gambar?`<img src="${gambar}">`:''}

<div class="card-content">

<h3>${judul}</h3>

<p>${konten}</p>

</div>

</div>
`;

});

document.getElementById("listPengumuman").innerHTML=html;

})

}

/* SIMPAN */

function simpan(){

const judul=document.getElementById("judul").value.trim();
const gambar=document.getElementById("gambar").value.trim();
const konten=document.getElementById("konten").value.trim();

if(!judul){

alert("Judul harus diisi");
return;

}

let form=new FormData();

form.append("judul",judul);
form.append("gambar",gambar);
form.append("konten",konten);

fetch(API,{method:"POST",body:form})

.then(res=>res.text())

.then(res=>{

if(res=="success"){

alert("Pengumuman berhasil disimpan");

document.getElementById("judul").value="";
document.getElementById("gambar").value="";
document.getElementById("konten").value="";

loadData();

}else{

alert("Gagal menyimpan");

}

})

}

loadData();

</script>

</body>
</html>
