<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; }
        .cctv-card { background: #1e1e1e; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; }
        .location-tag { padding: 10px; background: #262626; font-size: 14px; font-weight: bold; border-top: 1px solid #333; }
    </style>
</head>
<body>

<div class="container text-center mt-3">
    <h5>📹 MONITORING CCTV RT 07</h5>
    <hr style="border-color: #444">
    <div class="row">
        <? if (cctvData.length === 0) { ?>
            <p class="text-muted mt-5">Belum ada CCTV aktif di Google Sheets.</p>
        <? } else { ?>
            <? for (var i = 0; i < cctvData.length; i++) { ?>
                <div class="col-12 col-md-6">
                    <div class="cctv-card">
                        <div class="ratio ratio-16x9">
                            <iframe src="<?= cctvData[i].url ?>" allowfullscreen></iframe>
                        </div>
                        <div class="location-tag">📍 <?= cctvData[i].lokasi ?></div>
                    </div>
                </div>
            <? } ?>
        <? } ?>
    </div>
</div>

<div class="text-center mt-4 mb-5">
    <button onclick="window.location.reload()" class="btn btn-sm btn-outline-info px-4">🔄 Segarkan Halaman</button>
</div>

</body>
</html>
