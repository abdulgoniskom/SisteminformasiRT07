<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-3">
        <h5 class="text-center">📹 CCTV RT 07</h5>
        <hr>
        <div id="status" class="text-center mt-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p id="msg">Menghubungkan ke server...</p>
        </div>
        <div id="cctv-list" class="row"></div>
    </div>

    <script>
        window.onload = function() {
            const pass = prompt("Masukkan Password:");
            if (!pass) return;

            // Memanggil fungsi server
            google.script.run
                .withSuccessHandler(function(data) {
                    document.getElementById('status').style.display = 'none';
                    const list = document.getElementById('cctv-list');
                    
                    if (data.length == 0) {
                        list.innerHTML = "<p class='text-center'>Tidak ada CCTV aktif.</p>";
                        return;
                    }

                    data.forEach(item => {
                        const html = `
                            <div class="col-12 mb-3">
                                <div class="card bg-secondary text-white">
                                    <div class="ratio ratio-16x9">
                                        <iframe src="${item.url}" allowfullscreen></iframe>
                                    </div>
                                    <div class="p-2 small">📍 ${item.lokasi}</div>
                                </div>
                            </div>`;
                        list.insertAdjacentHTML('beforeend', html);
                    });
                })
                .withFailureHandler(function(err) {
                    document.getElementById('msg').innerHTML = "Error: " + err.message;
                })
                .getCCTVDataValidated(pass);
        };
    </script>
</body>
</html>
