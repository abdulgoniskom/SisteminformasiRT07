<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; }
        .card-cctv { background: #222; border: none; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .location-label { padding: 10px; font-size: 13px; background: #333; color: #bbb; }
    </style>
</head>
<body>
    <div class="container mt-3">
        <h5 class="text-center mb-3">📹 CCTV RT 07</h5>
        <div class="row">
            
            <? if (cctvData.length == 0) { ?>
                <p class="text-center mt-5 text-muted">Belum ada CCTV yang aktif.</p>
            <? } else { ?>
                
                <? for (var i = 0; i < cctvData.length; i++) { ?>
                    <div class="col-12 col-md-6">
                        <div class="card card-cctv">
                            <div class="ratio ratio-16x9">
                                <iframe src="<?= cctvData[i].url ?>" allowfullscreen></iframe>
                            </div>
                            <div class="location-label">📍 <?= cctvData[i].lokasi ?></div>
                        </div>
                    </div>
                <? } ?>

            <? } ?>

        </div>
    </div>

    <div class="text-center mt-4 mb-5">
        <button onclick="window.location.reload()" class="btn btn-sm btn-outline-primary">🔄 Segarkan</button>
    </div>
</body>
</html>
