<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; padding: 15px; }
        .cctv-card { background: #1e1e1e; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h5 class="text-center">📹 MONITORING CCTV RT 07</h5>
    <hr>
    <div id="loading" class="text-center mt-5">
        <div class="spinner-border text-primary"></div>
        <p>Mengambil data dari Google Sheets...</p>
    </div>
    <div id="cctv-container" class="row"></div>

    <script>
        // MASUKKAN LINK /exec DARI APPS SCRIPT TADI DI SINI
        const LINK_DATA = "https://script.google.com/macros/s/AKfycbzOJM2zECRZJGgOnKAXaeMDLj44qPvV2BRJjPEm9FcUbkl4SnOFKtJGx9GAfNlDAvY/exec";

        fetch(LINK_DATA)
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                const container = document.getElementById('cctv-container');
                
                data.forEach(item => {
                    const html = `
                        <div class="col-12 col-md-6">
                            <div class="cctv-card">
                                <div class="ratio ratio-16x9">
                                    <iframe src="${item.url}" allowfullscreen></iframe>
                                </div>
                                <div class="p-2 text-center small">📍 ${item.lokasi}</div>
                            </div>
                        </div>`;
                    container.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = "Gagal memuat data: " + err;
            });
    </script>
</body>
</html>
