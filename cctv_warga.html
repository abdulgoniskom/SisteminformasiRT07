<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; }
        .card-cctv { background: #222; border: none; border-radius: 12px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .location-label { padding: 12px; font-size: 14px; background: #2c2c2c; font-weight: bold; }
        .header-rt { padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-rt text-center">
            <h5 class="m-0">📹 MONITORING CCTV RT 07</h5>
            <small class="text-muted">Real-time Information System</small>
        </div>

        <div class="row">
            <? if (cctvData.length == 0) { ?>
                <div class="text-center mt-5">
                    <p class="text-muted">Belum ada siaran aktif di Google Sheets.</p>
                </div>
            <? } else { ?>
                
                <? for (var i = 0; i < cctvData.length; i++) { ?>
                    <div class="col-12 col-md-6">
                        <div class="card card-cctv">
                            <div class="ratio ratio-16x9">
                                <iframe src="<?= cctvData[i].url ?>" allowfullscreen></iframe>
                            </div>
                            <div class="location-label text-center">
                                📍 <?= cctvData[i].lokasi ?>
                            </div>
                        </div>
                    </div>
                <? } ?>

            <? } ?>
        </div>
    </div>

    <div class="text-center mt-4 mb-5">
        <button onclick="window.location.reload()" class="btn btn-sm btn-outline-info px-4">🔄 Segarkan Halaman</button>
    </div>
</body>
</html>
