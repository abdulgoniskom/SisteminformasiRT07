<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV RT 07</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #eef2f7; font-family: 'Segoe UI', sans-serif; }
        .header-cctv { background: #2c3e50; color: white; padding: 25px 15px; border-radius: 0 0 25px 25px; }
        .card-cctv { border: none; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; background: white; }
        .badge-live { position: absolute; top: 12px; right: 12px; z-index: 10; background: #eb5757; font-size: 10px; }
    </style>
</head>
<body>

<div class="header-cctv text-center">
    <h2 style="font-size: 20px;">📹 CCTV Lingkungan</h2>
    <p style="font-size: 12px; opacity: 0.8;">RT 07 RW 09 Bumi Indah City</p>
</div>

<div class="container mt-4">
    <div id="main-content">
        <div id="loader" class="text-center py-5">
            <div class="spinner-border text-primary mb-2"></div>
            <p>Memverifikasi akses...</p>
        </div>
        <div class="row g-3" id="cctv-container"></div>
    </div>

    <div class="text-center mt-3">
        <a href="fitur.html" style="text-decoration:none; font-weight:bold; color:#2f80ed;">← Kembali</a>
    </div>
</div>

<script src="https://script.google.com/macros/s/AKfycbxMWXAx_trphBfxoHwikafu67O5Cou8KwIeKoeyyP3Z9e3wqXTnuo1Ls5JI890E5hI/exec"></script>
<script>
    window.onload = function() {
        // Minta password ke warga
        let passWarga = prompt("Masukkan Kode Akses RT 07:");
        
        if (!passWarga) {
            window.location.href = "cctv_warga.html";
            return;
        }

        // Kirim password ke server untuk divalidasi
        google.script.run
            .withSuccessHandler(renderCCTV)
            .withFailureHandler(function(err) {
                alert(err.message);
                window.location.href = "cctv_warga.html";
            })
            .getCCTVDataValidated(passWarga);
    };

    function renderCCTV(data) {
        const container = document.getElementById('cctv-container');
        document.getElementById('loader').style.display = 'none';

        if (data.length === 0) {
            container.innerHTML = '<p class="text-center mt-4">Belum ada kamera aktif.</p>';
            return;
        }

        data.forEach((item, index) => {
            let media = item.tipe === "YouTube" 
                ? `<div class="ratio ratio-16x9"><iframe src="${item.url}" allowfullscreen></iframe></div>`
                : `<video id="v-${index}" class="video-js vjs-default-skin vjs-16-9" controls preload="auto"><source src="${item.url}" type="application/x-mpegURL"></video>`;

            const card = `
                <div class="col-12 col-md-6">
                    <div class="card card-cctv">
                        <span class="badge badge-live">● LIVE</span>
                        ${media}
                        <div class="card-footer bg-white border-0 py-3"><b>📍 ${item.lokasi}</b></div>
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', card);
            if (item.tipe !== "YouTube") videojs(`v-${index}`);
        });
    }
</script>
</body>
</html>
