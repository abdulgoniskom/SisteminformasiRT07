<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Digital RT 07</title>
    <style>
        /* CSS IDENTIK DENGAN INDEX.HTML ANDA */
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { background:#f1f4f9; display:flex; }
        .sidebar { width:220px; background:#2c3e50; height:100vh; color:white; position:fixed; }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; }
        .sidebar a:hover, .sidebar a.active { background:#34495e; }
        .main { margin-left:220px; width:100%; }
        header { background:white; padding:15px 30px; box-shadow:0 2px 5px rgba(0,0,0,0.1); display:flex; justify-content:space-between; align-items: center; }
        .container { padding:30px; }

        /* STYLE KHUSUS ARSIP */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .folder { 
            background: white; padding: 20px; border-radius: 12px; text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s;
            border: 1px solid #eee;
        }
        .folder:hover { transform: translateY(-5px); border-color: #2f80ed; }
        .folder i { font-size: 40px; margin-bottom: 10px; display: block; }
        
        .search-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        
        .btn-add { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: none; font-weight: bold; }

        .table-box { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fc; padding: 15px; text-align: left; color: #7f8c8d; font-size: 13px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; }
        .bg-pdf { background: #eb5757; }
        .bg-img { background: #27ae60; }
        .bg-doc { background: #2f80ed; }

        .btn-view { color: #2f80ed; text-decoration: none; font-weight: bold; }
        .btn-view:hover { text-decoration: underline; }

        #loading { text-align: center; padding: 20px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html" class="active">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main">
    <header>
        <h2>Digital Archive RT 07</h2>
        <div id="status">Mode Warga</div>
    </header>

    <div class="container">
        <div class="folder-grid">
            <div class="folder" onclick="filterData('')"><i>📂</i><h4>Semua</h4></div>
            <div class="folder" onclick="filterData('Surat')"><i>✉️</i><h4>Surat</h4></div>
            <div class="folder" onclick="filterData('Keuangan')"><i>💰</i><h4>Keuangan</h4></div>
            <div class="folder" onclick="filterData('Laporan')"><i>📊</i><h4>Laporan</h4></div>
        </div>

        <div class="search-area">
            <input type="text" id="search" class="search-input" placeholder="Cari dokumen..." onkeyup="searchData()">
            <button class="btn-add" id="adminBtn" onclick="tambahArsip()">+ Arsip Baru</button>
        </div>

        <div id="loading">Memuat arsip...</div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Nama Dokumen</th>
                        <th>Kategori</th>
                        <th>Format</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="arsipBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbz2zMa4ELr76mfmg8egQLohWWddKiDyk9sEtICzHA4N9IVIZvG90KvhFtGOwRYI5HSx/exec"; // Ganti dengan URL Apps Script Anda
    let allData = [];

    // CEK ADMIN
    if(localStorage.getItem('rt07_admin') === 'true') {
        document.getElementById('adminBtn').style.display = 'block';
        document.getElementById('status').innerText = "Administrator";
        document.getElementById('status').style.color = "#27ae60";
    }

    // AMBIL DATA
    async function loadArsip() {
        try {
            const res = await fetch(API + "?sheet=Arsip");
            allData = await res.json();
            renderTable(allData);
            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            document.getElementById('loading').innerText = "Gagal memuat data.";
        }
    }

    function renderTable(data) {
        let html = "";
        data.forEach(item => {
            let badgeClass = "bg-doc";
            if(item.jenis.toLowerCase() === 'pdf') badgeClass = "bg-pdf";
            if(item.jenis.toLowerCase() === 'img') badgeClass = "bg-img";

            html += `<tr>
                <td>${item.tanggal.split('T')[0]}</td>
                <td><b>${item.nama}</b></td>
                <td>${item.kategori}</td>
                <td><span class="badge ${badgeClass}">${item.jenis}</span></td>
                <td><a href="${item.link}" target="_blank" class="btn-view">Lihat Dokumen</a></td>
            </tr>`;
        });
        document.getElementById('arsipBody').innerHTML = html;
    }

    // FILTER SEARCH
    function searchData() {
        let val = document.getElementById('search').value.toLowerCase();
        let filtered = allData.filter(i => i.nama.toLowerCase().includes(val));
        renderTable(filtered);
    }

    // FILTER FOLDER
    function filterData(cat) {
        if(cat === "") return renderTable(allData);
        let filtered = allData.filter(i => i.kategori === cat);
        renderTable(filtered);
    }

    // INPUT ADMIN
    async function tambahArsip() {
        let tgl = new Date().toISOString().split('T')[0];
        let nama = prompt("Nama Dokumen:");
        let kat = prompt("Kategori (Surat/Keuangan/Laporan):");
        let link = prompt("Link Google Drive (Pastikan setting: Anyone with link can view):");
        let jenis = prompt("Jenis File (PDF/IMG/DOC):");

        if(nama && link) {
            document.getElementById('adminBtn').innerText = "Menyimpan...";
            await fetch(API, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ tanggal: tgl, nama: nama, kategori: kat, link: link, jenis: jenis })
            });
            alert("Berhasil!");
            location.reload();
        }
    }

    loadArsip();
</script>
</body>
</html>
