<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Digital RT 07</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { background:#f1f4f9; display:flex; overflow-x: hidden; }

        /* SIDEBAR IDENTIK DENGAN KALENDER */
        .sidebar { 
            width:220px; background:#2c3e50; height:100vh; color:white; 
            position:fixed; transition: 0.3s; z-index: 1000; 
        }
        .sidebar h2 { text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.2); font-size:18px; }
        .sidebar a { display:block; color:white; padding:15px; text-decoration:none; font-size:14px; }
        .sidebar a:hover, .sidebar a.active { background:#34495e; border-left: 4px solid #1abc9c; }
        
        /* MAIN CONTENT RESPONSIF */
        .main { margin-left:220px; width:100%; transition: 0.3s; min-width: 0; }
        header { 
            background:white; padding:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); 
            display:flex; justify-content:space-between; align-items: center; 
        }

        .menu-btn { display: none; font-size: 24px; cursor: pointer; color: #2c3e50; padding: 0 10px; }
        .container { padding:20px; }

        /* TOMBOL LOGIN/LOGOUT */
        .btn-login { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; background: #f2994a; color: white; }
        .btn-logout { background: #eb5757; color: white; }

        /* STYLE KHUSUS ARSIP */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .folder { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 1px solid #eee; }
        .folder:hover { border-color: #2f80ed; background: #f0f7ff; }
        .folder h4 { font-size: 13px; color: #2c3e50; margin-top: 5px; }
        
        .search-area { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: none; font-weight: bold; }

        .table-box { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8f9fc; padding: 15px; text-align: left; color: #7f8c8d; font-size: 13px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; }
        .bg-pdf { background: #eb5757; }
        .bg-img { background: #27ae60; }
        .bg-doc { background: #2f80ed; }

        .btn-view { color: #2f80ed; text-decoration: none; font-weight: bold; font-size: 13px; }

        /* RESPONSIVE HP (IDENTIK KALENDER) */
        @media (max-width: 768px) {
            .sidebar { left: -220px; }
            .sidebar.open { left: 0; }
            .main { margin-left: 0; }
            .menu-btn { display: block; }
            header h2 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="mySidebar">
    <h2>RT 07 RW 09</h2>
    <a href="index.html">Dashboard</a>
    <a href="kas.html">Kas RT</a>
    <a href="warga.html">Data Warga</a>
    <a href="pengumuman.html">Pengumuman</a>
    <a href="kalender.html">Kalender</a>
    <a href="arsip.html" class="active">Arsip</a>
    <a href="struktur.html">Struktur</a>
</div>

<div class="main">
    <header>
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <h2 id="headerTitle">Digital Archive</h2>
        <button class="btn-login" id="authBtn" onclick="handleAuth()">Login Admin</button>
    </header>

    <div class="container">
        <div id="statusInfo" style="margin-bottom: 15px; font-size: 12px; font-weight: bold; color: #7f8c8d;">Mode Warga</div>

        <div class="folder-grid">
            <div class="folder" onclick="filterData('')"><h4>📁 Semua</h4></div>
            <div class="folder" onclick="filterData('Surat')"><h4>✉️ Surat</h4></div>
            <div class="folder" onclick="filterData('Keuangan')"><h4>💰 Keuangan</h4></div>
            <div class="folder" onclick="filterData('Laporan')"><h4>📊 Laporan</h4></div>
        </div>

        <div class="search-area">
            <input type="text" id="search" class="search-input" placeholder="Cari nama dokumen..." onkeyup="searchData()">
            <button class="btn-add" id="adminBtn" onclick="tambahArsip()">+ Arsip Baru</button>
        </div>

        <div id="loading" style="text-align:center; padding:20px; color:#7f8c8d;">Memuat data arsip...</div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Nama Dokumen</th>
                        <th>Kategori</th>
                        <th>Format</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="arsipBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // PENTING: Gunakan URL API Arsip Bapak
    const API = "https://script.google.com/macros/s/AKfycbz2zMa4ELr76mfmg8egQLohWWddKiDyk9sEtICzHA4N9IVIZvG90KvhFtGOwRYI5HSx/exec"; 
    let allData = [];
    let isAdmin = (localStorage.getItem('rt07_admin') === 'true');

    // FUNGSI TOGGLE SIDEBAR (SAMA DENGAN KALENDER)
    function toggleSidebar() {
        document.getElementById("mySidebar").classList.toggle("open");
    }

    // FUNGSI LOGIN (SAMA DENGAN KALENDER)
    function handleAuth() {
        if (isAdmin) {
            localStorage.removeItem('rt07_admin');
            alert("Anda telah logout.");
            location.reload();
        } else {
            const pass = prompt("Masukkan Password Admin:");
            if (pass === "123") {
                localStorage.setItem('rt07_admin', 'true');
                alert("Login Berhasil!");
                location.reload();
            } else {
                alert("Password Salah!");
            }
        }
    }

    // TAMPILAN JIKA ADMIN
    if (isAdmin) {
        document.getElementById('adminBtn').style.display = 'block';
        document.getElementById('authBtn').innerText = "Logout Admin";
        document.getElementById('authBtn').classList.add("btn-logout");
        document.getElementById('statusInfo').innerText = "Mode Administrator";
        document.getElementById('statusInfo').style.color = "#27ae60";
    }

    // AMBIL DATA
    async function loadArsip() {
        try {
            const res = await fetch(API + "?sheet=Arsip RT 07");
            allData = await res.json();
            renderTable(allData);
            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            document.getElementById('loading').innerText = "Gagal memuat data dari server.";
        }
    }

    function renderTable(data) {
        let html = "";
        data.forEach(item => {
            let badgeClass = "bg-doc";
            let jenis = item.jenis ? item.jenis.toLowerCase() : "doc";
            if(jenis === 'pdf') badgeClass = "bg-pdf";
            if(jenis.includes('jpg') || jenis.includes('png') || jenis.includes('img')) badgeClass = "bg-img";

            html += `<tr>
                <td>${item.tanggal ? item.tanggal.split('T')[0] : '-'}</td>
                <td><b>${item.nama}</b></td>
                <td>${item.kategori}</td>
                <td><span class="badge ${badgeClass}">${jenis.toUpperCase()}</span></td>
                <td><a href="${item.link}" target="_blank" class="btn-view">Lihat Dokumen</a></td>
            </tr>`;
        });
        document.getElementById('arsipBody').innerHTML = html;
    }

    function searchData() {
        let val = document.getElementById('search').value.toLowerCase();
        let filtered = allData.filter(i => i.nama.toLowerCase().includes(val));
        renderTable(filtered);
    }

    function filterData(cat) {
        if(cat === "") return renderTable(allData);
        let filtered = allData.filter(i => i.kategori === cat);
        renderTable(filtered);
    }

    async function tambahArsip() {
        let tgl = new Date().toISOString().split('T')[0];
        let nama = prompt("Nama Dokumen:");
        let kat = prompt("Kategori (Surat/Keuangan/Laporan):");
        let link = prompt("Link Google Drive:");
        let jenis = prompt("Jenis File (PDF/IMG/DOC):");

        if(nama && link) {
            document.getElementById('adminBtn').innerText = "Menyimpan...";
            try {
                // Catatan: Gunakan URLSearchParams jika POST Bapak menggunakan doPOST standar
                await fetch(API, {
                    method: 'POST',
                    body: JSON.stringify({ tanggal: tgl, nama: nama, kategori: kat, link: link, jenis: jenis })
                });
                alert("Dokumen berhasil diarsipkan!");
                location.reload();
            } catch (e) {
                alert("Data dikirim ke sistem."); // Kadang CORS terbaca error tapi data masuk
                location.reload();
            }
        }
    }

    // Tutup sidebar jika klik di luar (untuk HP)
    document.addEventListener('click', function(event) {
        var sidebar = document.getElementById('mySidebar');
        var btn = document.querySelector('.menu-btn');
        if (window.innerWidth <= 768 && !sidebar.contains(event.target) && event.target !== btn) {
            sidebar.classList.remove('open');
        }
    });

    loadArsip();
</script>
</body>
</html>
