<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Kegiatan RT 07</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:#eef2f7; padding: 15px; }
        
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: #9b59b6; }
        
        /* Grid Foto */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 kolom di HP */
            gap: 12px;
        }

        .gallery-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover; /* Agar foto tidak gepeng */
            display: block;
        }

        .gallery-info {
            padding: 10px;
            text-align: center;
        }

        .gallery-info b { font-size: 12px; color: #333; display: block; }
        .gallery-info span { font-size: 10px; color: #7f8c8d; }

        .btn-back { display: block; text-align: center; margin-top: 30px; color: #7f8c8d; text-decoration: none; font-size: 13px; }

        @media (min-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(3, 1fr); } /* 3 kolom di Laptop */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📸 Galeri Kegiatan</h2>
        <p style="font-size: 12px; color: #7f8c8d;">Momen kebersamaan warga RT 07 RW 09</p>
    </div>

    <div class="gallery-grid" id="kontenGaleri">
        <p style="grid-column: span 2; text-align: center; color: #999;">Memuat foto kegiatan...</p>
    </div>
    
    <a href="fitur.html" class="btn-back">← Kembali ke Fitur Warga</a>
</div>

<script>
    const SCRIPT_URL = "URL_APP_SCRIPT_BAPAK"; 

    function loadGaleri() {
        fetch(SCRIPT_URL + "?sheet=Galeri")
        .then(r => r.json())
        .then(data => {
            let html = "";
            data.reverse().forEach(item => { // Foto terbaru muncul duluan
                html += `
                <div class="gallery-item">
                    <img src="${item.link_foto}" alt="Kegiatan" onerror="this.src='https://via.placeholder.com/300x200?text=Foto+RT07'">
                    <div class="gallery-info">
                        <b>${item.nama_kegiatan}</b>
                        <span>${item.tanggal}</span>
                    </div>
                </div>`;
            });
            document.getElementById("kontenGaleri").innerHTML = html || '<p style="grid-column: span 2;">Belum ada foto kegiatan.</p>';
        })
        .catch(() => {
            document.getElementById("kontenGaleri").innerHTML = '<p style="grid-column: span 2; color:red;">Gagal memuat galeri.</p>';
        });
    }

    window.onload = loadGaleri;
</script>

</body>
</html>
